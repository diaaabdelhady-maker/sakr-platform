<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AMR SAKR</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body {
            position: relative;
            overflow-x: hidden;
            font-family: "Share Tech", sans-serif;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -20%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 230, 107, 0.20), transparent 22%),
                radial-gradient(circle at 80% 0%, rgba(124, 58, 237, 0.26), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(255,255,255,0.12), transparent 24%);
            filter: blur(8px);
            animation: drift 10s ease-in-out infinite alternate;
        }

        body::after {
            background-image:
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,0.75), transparent);
            opacity: 0.38;
            animation: gridMove 16s linear infinite;
        }

        .hero-wrap {
            position: relative;
            z-index: 2;
            width: min(100%, 980px);
            padding-top: 24px;
        }

        .hero-card.error-card {
            position: relative;
            overflow: hidden;
            min-height: 560px;
            padding: 24px;
            isolation: isolate;
            transform-style: preserve-3d;
            transform: perspective(1100px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            transition: transform 0.2s ease-out, box-shadow 0.3s ease;
        }

        .hero-card.error-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 230, 107, 0.16), rgba(124, 58, 237, 0.16), rgba(255,255,255,0.12));
            filter: blur(24px);
            z-index: -2;
            animation: pulseGlow 5s ease-in-out infinite;
        }

        .hero-card.error-card::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
            z-index: -1;
        }

        .error-visual {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            margin: 8px auto 10px;
        }

        .error-ring {
            position: relative;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.16);
            border-top-color: #ffe56b;
            border-right-color: #7c3aed;
            box-shadow: 0 0 35px rgba(124,58,237,0.24), inset 0 0 24px rgba(255,255,255,0.08);
            animation: spin 8s linear infinite;
        }

        .error-ring::before,
        .error-ring::after {
            content: "";
            position: absolute;
            inset: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .error-ring::before {
            inset: 30px;
            border-top-color: rgba(255,255,255,0.7);
            animation: spinReverse 6s linear infinite;
        }

        .error-ring::after {
            inset: 8px;
            border-left-color: rgba(255, 230, 107, 0.7);
            animation: spin 10s linear infinite;
        }

        .error-core {
            position: absolute;
            width: 122px;
            height: 122px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.32), rgba(255,255,255,0.12) 38%, rgba(0,0,0,0.24) 100%);
            box-shadow: 0 0 26px rgba(255,255,255,0.16), inset 0 0 20px rgba(255,255,255,0.12);
            animation: pulse 2.4s ease-in-out infinite;
        }

        .error-code {
            position: absolute;
            font-size: 74px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 16px rgba(255,255,255,0.18), 0 0 36px rgba(124,58,237,0.45);
            animation: floatText 3s ease-in-out infinite;
        }

        .error-star {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 230, 107, 0.9);
            animation: floatStar 4.4s ease-in-out infinite;
            opacity: 0.95;
        }

        .error-star:nth-child(2) { top: 10%; left: 18%; animation-delay: 0.1s; }
        .error-star:nth-child(3) { top: 24%; right: 16%; animation-delay: 0.7s; }
        .error-star:nth-child(4) { bottom: 18%; left: 24%; animation-delay: 1.1s; }
        .error-star:nth-child(5) { bottom: 14%; right: 22%; animation-delay: 1.6s; }

        .hero-title {
            font-size: 34px;
            letter-spacing: 2px;
            margin-top: 10px;
            animation: glowText 2.4s ease-in-out infinite alternate;
        }

        .hero-text {
            max-width: 560px;
            font-size: 16px;
            line-height: 1.7;
            margin: 8px auto 0;
        }

        .hero-actions {
            margin-top: 10px;
        }

        .btn-group {
            width: min(100%, 360px);
            gap: 12px;
            margin-top: 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 360px;
            min-height: 58px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 0 18px;
            font-size: 18px;
            letter-spacing: 1.8px;
            text-decoration: none;
            box-sizing: border-box;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 26px rgba(0,0,0,0.35);
        }

        @keyframes drift {
            0% { transform: translate3d(-2%, -1.5%, 0) scale(1); }
            100% { transform: translate3d(3%, 2%, 0) scale(1.04); }
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(34px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.96); opacity: 0.9; }
            50% { transform: scale(1.04); opacity: 1; }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        @keyframes floatStar {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.75; }
            50% { transform: translateY(-10px) scale(1.18); opacity: 1; }
        }

        @keyframes glowText {
            from { text-shadow: 0 0 10px rgba(255,255,255,0.16), 0 0 24px rgba(124,58,237,0.28); }
            to { text-shadow: 0 0 18px rgba(255,255,255,0.24), 0 0 40px rgba(124,58,237,0.42); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.01); }
        }

        @media (max-width: 850px) {
            .hero-card.error-card {
                min-height: auto;
                padding: 20px 14px 24px;
            }

            .error-ring {
                width: 176px;
                height: 176px;
            }

            .error-core {
                width: 102px;
                height: 102px;
            }

            .error-code {
                font-size: 64px;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="upbox">
       <div class="hh"><img src="logo.png" width="70px" alt="Logo"></div>
       <span class="brand-name">AMR SAKR</span>
       <div class="upboxs">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
          <img src="menu.png" width="60px" alt="Menu">
        </button>
       </div>
    </div>

    <aside id="sideMenu" class="side-menu" aria-label="Main menu">
      <button id="closeMenu" class="close-menu" type="button" aria-label="Close menu"><span class="material-symbols-rounded">close</span></button>
      <h2>AMR SAKR</h2>
      <a href="index.html"><span class="material-symbols-rounded menu-icon">home</span>HOME</a>
      <a href="code.html"><span class="material-symbols-rounded menu-icon">login</span>SIGN IN</a>
      <a href="contact.html"><span class="material-symbols-rounded menu-icon">mail</span>CONTACT</a>
    </aside>

    <main class="hero-wrap">
        <section class="hero-card hero-split error-card" id="errorCard">
            <article class="hero-visual">
                <div class="error-visual" aria-hidden="true">
                    <div class="error-star"></div>
                    <div class="error-star"></div>
                    <div class="error-star"></div>
                    <div class="error-star"></div>
                    <div class="error-ring"></div>
                    <div class="error-core"></div>
                    <div class="error-code">404</div>
                </div>
                <h1 class="hero-title">Page Not Found</h1>
                <p class="hero-text">The page you are looking for doesn't exist or may have been moved.</p>
            </article>

            <aside class="hero-actions">
                <div class="btn-group">
                    <a href="index.html" class="btn">BACK TO HOME</a>
                    <a href="contact.html" class="btn">CONTACT SUPPORT</a>
                </div>
            </aside>
        </section>
    </main>

    <script>
      const menuBtn = document.getElementById('menuBtn');
      const sideMenu = document.getElementById('sideMenu');
      const overlay = document.getElementById('menuOverlay');
      const closeMenu = document.getElementById('closeMenu');
      const errorCard = document.getElementById('errorCard');

      function openMenu() {
        sideMenu.classList.add('open');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }

      function closeMenuPanel() {
        sideMenu.classList.remove('open');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }

      if (errorCard) {
        errorCard.addEventListener('mousemove', (event) => {
          const rect = errorCard.getBoundingClientRect();
          const x = (event.clientX - rect.left) / rect.width;
          const y = (event.clientY - rect.top) / rect.height;
          const rotateY = (x - 0.5) * 8;
          const rotateX = (0.5 - y) * 8;
          errorCard.style.setProperty('--rx', `${rotateX.toFixed(2)}deg`);
          errorCard.style.setProperty('--ry', `${rotateY.toFixed(2)}deg`);
        });

        errorCard.addEventListener('mouseleave', () => {
          errorCard.style.setProperty('--rx', '0deg');
          errorCard.style.setProperty('--ry', '0deg');
        });
      }

      menuBtn.addEventListener('click', openMenu);
      closeMenu.addEventListener('click', closeMenuPanel);
      overlay.addEventListener('click', closeMenuPanel);
    </script>
</body>
</html>
