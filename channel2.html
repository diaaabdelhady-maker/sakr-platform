    <style>
     /* 🔔 نظام الإشعارات الاحترافي */
      .notifications-container {
        position: fixed;
        top: 90px;
        right: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 360px;
        pointer-events: none;
      }

      .notification-toast {
        background: linear-gradient(135deg, rgba(255, 215, 0, 0.95) 0%, rgba(255, 180, 0, 0.95) 100%);
        color: #04043b;
        padding: 16px 20px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3), 
                    0 0 20px rgba(255, 215, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: "Share Tech", sans-serif;
        font-size: 15px;
        pointer-events: auto;
        animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(10px);
      }

      .notification-toast.exit {
        animation: slideOutRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .notification-icon {
        font-size: 20px;
        flex-shrink: 0;
      }

      .notification-content {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
      }

      .notification-sender {
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .notification-message {
        font-size: 14px;
        color: rgba(4, 4, 59, 0.85);
        font-weight: 400;
        word-break: break-word;
      }

      .notification-close {
        background: rgba(4, 4, 59, 0.1);
        border: none;
        color: rgba(4, 4, 59, 0.6);
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        transition: all 0.2s ease;
      }

      .notification-close:hover {
        background: rgba(4, 4, 59, 0.2);
        color: rgba(4, 4, 59, 0.9);
      }

      .notification-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(4, 4, 59, 0.3);
        border-radius: 16px;
        animation: progressFill 15s linear forwards;
      }

      @keyframes slideInRight {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOutRight {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      @keyframes progressFill {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }

      @media (max-width: 768px) {
        .notifications-container {
          left: 10px;
          right: 10px;
          max-width: none;
        }
        .notification-toast {
          padding: 14px 16px;
          font-size: 14px;
        }
      }

      .name-container {
        margin: 20px 0;
        padding: 15px 20px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        display: block;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      }
      
      #nameDisplay {
        font-size: 1.5rem;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.5px;
      }
      
      .welcome-text {

      }

      /* 🌌 التصميم الفلكي الاحترافي لزرار الإنجازات */
      .btn-achievements {
        position: relative;
        background-color: #050508;
        background-image: 
          radial-gradient(circle at 15% 25%, #fff 1.5px, transparent 1.5px),
          radial-gradient(circle at 75% 15%, #fff 1px, transparent 1px),
          radial-gradient(circle at 35% 75%, rgba(255,255,255,0.8) 2px, transparent 2px),
          radial-gradient(circle at 55% 30%, #fff 0.8px, transparent 0.8px),
          radial-gradient(circle at 85% 85%, #fff 1.2px, transparent 1.2px),
          linear-gradient(135deg, #05050a 0%, #160a2c 100%);
        background-size: 100% 100%;
        color: #fff !important;
        border: 1px solid #4a2685 !important;
        overflow: hidden;
        z-index: 1;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn-achievements::after {
        content: "";
        position: absolute;
        right: -25px;
        top: 50%;
        width: 68px;
        height: 68px;
        background: radial-gradient(circle at 30% 30%, #b366ff, #541399 50%, #190033);
        border-radius: 50%;
        box-shadow: 
          inset -6px -6px 14px rgba(0,0,0,0.95),
          0 0 20px rgba(179, 102, 255, 0.4);
        z-index: -1;
        opacity: 0.9;
        transform: translateY(-50%) scale(1);
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn-achievements .ring {
        position: absolute;
        right: -42px;
        top: 50%;
        width: 100px;
        height: 14px;
        border: 2px solid rgba(218, 179, 255, 0.35);
        border-radius: 50%;
        z-index: -1;
        transform: translateY(-50%) rotate(-18deg) scale(1);
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none;
      }

      .btn-achievements .small-planet {
        position: absolute;
        right: 60px;
        top: 15%;
        width: 18px;
        height: 18px;
        background: radial-gradient(circle at 30% 30%, #ff79c6, #8b1e5f);
        border-radius: 50%;
        box-shadow: inset -2px -2px 5px rgba(0,0,0,0.8);
        z-index: -2;
        opacity: 0.5;
        transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn-achievements:hover {
        border-color: #9b51e0 !important;
        box-shadow: 0 0 30px rgba(155, 81, 224, 0.4);
        background-color: #0a0616;
      }
      
      .btn-achievements:hover::after {
        right: 40%;
        transform: translateY(-50%) scale(1.15);
        opacity: 0.95;
        box-shadow: 
          inset -6px -6px 14px rgba(0,0,0,0.95),
          0 0 40px rgba(179, 102, 255, 0.85);
      }

      .btn-achievements:hover .ring {
        right: 34%;
        transform: translateY(-50%) rotate(-18deg) scale(1.15);
        border-color: rgba(218, 179, 255, 0.6);
      }

      .btn-achievements:hover .small-planet {
        right: 85%;
        top: 60%;
        transform: scale(0.8);
        opacity: 0.2;
      }

      /* 🎨 التنسيق المحدث كلياً ليرث ألوان الـ CSS الأصلية للزر الخاص بك */
      .channel-btns {
        display: flex !important;
        flex-direction: column;
        gap: 14px;
        width: 100%;
        box-sizing: border-box;
      }

      .channel-btns a {
        text-decoration: none;
        width: 100%;
      }

      .channel-square-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 14px 20px;
        box-sizing: border-box;
        
        /* 🎨 ترث التنسيقات والألوان الأصلية من فئة الـ .btn الخاصة بك */
        font-family: inherit;
        font-size: inherit;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        
        /* يجعل الزر ينسخ نفس تصميم الحواف والشكل الخارجي */
        border-radius: 14px; 
      }

      /* الأيقونة المعبرة جهة اليسار */
      .channel-square-btn .main-icon {
        font-size: 1.8rem;
        transition: transform 0.3s ease, color 0.3s ease;
      }

      /* اسم الزر في المنتصف */
      .channel-square-btn .btn-title {
        font-family: "Share Tech", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        flex: 1;
        text-align: center;
      }

      /* المربع الصغير الذي يحتوي على السهم جهة اليمين */
      .channel-square-btn .arrow-box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      /* السهم نفسه داخل المربع */
      .channel-square-btn .arrow-icon {
        font-size: 1.1rem;
        transition: all 0.3s ease;
      }

      /* تأثيرات الـ Hover */
      .channel-square-btn:hover {
        transform: translateY(-2px);
        font-size: 18px;
      }

      .channel-square-btn:hover .main-icon {
        
        transform: scale(1.3) rotate(-7deg);
        color: gold;
      }

      .channel-square-btn:hover .arrow-box {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
      }

      .channel-square-btn:hover .arrow-icon {
        transform: translate(2px, -2px);
      }

      .channel-square-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC1bNuWAD8noagHV2SD0y4PP0ABhxDdqo",
  authDomain: "students-68430.firebaseapp.com",
  projectId: "students-68430",
  storageBucket: "students-68430.firebasestorage.app",
  messagingSenderId: "202641775624",
  appId: "1:202641775624:web:fe2d70e4ec92d62d5b85bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.goLogin = function(message){
    if (message) {
        alert(message);
    }
    localStorage.removeItem("savedCode");
    localStorage.removeItem("userId");
    localStorage.removeItem("userName");
    localStorage.removeItem("completedLessons");
    window.location.href = "code.html";
}

async function checkUser(){
    let code = new URLSearchParams(window.location.search).get("code");

    if(!code){
        code = localStorage.getItem("userId");
    }

    if(!code){
        window.goLogin("Please enter your code first.");
        return;
    }

    try {
        const ref = doc(db, "students", code);
        const snap = await getDoc(ref);

        if(!snap.exists()){
            window.goLogin("This code is wrong. Please try again.");
            return;
        }

        const data = snap.data();

        if(!data.active){
            window.goLogin("Your code is not active.");
            return;
        }

        // عرض اسم الطالب
        document.getElementById("nameDisplay").textContent = data.name || "Student";

        localStorage.setItem("userName", data.name || "Student");
        localStorage.setItem("userId", code);

        // فحص ذكي للحقل لتجنب مشاكل الـ Capital والـ Small حروف اسم الحقل في الفايربيز
        let lessonsData = data.completedLessons || data.CompletedLessons || data.completedlessons || null;

        if (lessonsData && Array.isArray(lessonsData)) {
            localStorage.setItem("completedLessons", JSON.stringify(lessonsData));
        } else {
            localStorage.setItem("completedLessons", JSON.stringify([]));
        }

        if (window.location.search.includes("code=")) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    } catch (e) {
        console.error("Firebase Error: ", e);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    checkUser();
});
</script>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');

  function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeMenuPanel() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenu) closeMenu.addEventListener('click', closeMenuPanel);
  if (overlay) overlay.addEventListener('click', closeMenuPanel);

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeMenuPanel();
  });
</script>
