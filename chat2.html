  <style>
    .chatBox {
      -ms-overflow-style: none !important;
      scrollbar-width: none !important;
    }

    .chatBox::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    .chatBox::-webkit-scrollbar-button,
    .chatBox::-webkit-scrollbar-track,
    .chatBox::-webkit-scrollbar-thumb {
      display: none !important;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.22), transparent 12%), radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.14), transparent 18%), radial-gradient(circle at 80% 0%, rgba(124, 58, 237, 0.25), transparent 20%), linear-gradient(145deg, #04043b 0%, #06066b 30%, #01011f 65%, #00000e 100%);
      color: #fff;
      font-family: "Share Tech", sans-serif;
      padding-top: 82px;
      box-sizing: border-box;
    }

    .chat-shell {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 18px 14px 140px;
      box-sizing: border-box;
    }

    .chat-header {
      margin-bottom: 14px;
      text-align: left;
      color: #fff;
      position: relative;
    }

    .chat-header .hero-title {
      font-size: 30px;
      margin: 0 0 8px;
    }

    .chat-header .hero-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      max-width: 720px;
      margin: 0;
    }

    .chatBox {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 520px;
      max-height: calc(100vh - 320px);
      overflow-y: auto;
      padding: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .daySeparator {
      color: #ffe56b;
      font-size: 14px;
      text-align: center;
      text-transform: uppercase;
      margin: 12px 0;
    }

    .messageWrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .messageWrapper.me {
      align-items: flex-end;
    }

    .messageWrapper.other {
      align-items: flex-start;
    }

    .message {
      display: flex;
      flex-direction: column;
      width: fit-content;
      max-width: 60%;
      padding: 14px 18px;
      border-radius: 24px;
      font-size: 19px;
      line-height: 1.4;
      animation: show 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      box-sizing: border-box;
    }

    .message.me {
      background: linear-gradient(135deg, #fff7c5 0%, #ffd700 45%, #ffbb00 100%);
      color: #03041a; 
      border-top-right-radius: 5px;
    }

    .message.other {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff; 
      border-top-left-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .message .author {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .message.me .author {
      color: rgba(3, 4, 26, 0.85);
    }
    .message.other .author {
      color: #ffe56b; 
    }

    .message .content {
      display: flex;
      flex-direction: column;
      gap: 8px;
      word-break: break-word;
    }

    .message .content img {
      width: 100%;
      border-radius: 18px;
      object-fit: cover;
      cursor: pointer;
    }

    .message .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 12px;
      width: 100%;
    }
    .message.me .meta {
      color: rgba(3, 4, 26, 0.7);
    }
    .message.other .meta {
      color: rgba(255, 255, 255, 0.6);
    }

    .message .small-delete-btn {
      background: rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.2);
      color: #4a0000;
      padding: 1px 6px;
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
      font-family: "Share Tech", sans-serif;
      line-height: 1.2;
      transition: all 0.15s ease;
    }
    .message.other .small-delete-btn {
      background: rgba(255, 59, 59, 0.12);
      border: 1px solid rgba(255, 59, 59, 0.3);
      color: #ff8080;
    }
    .message .small-delete-btn:hover {
      background: #ff3b3b;
      color: #fff;
      border-color: #ff3b3b;
    }

    .message .replyBlock {

      background: rgba(0,0,0,0.18);

    }

    .close-zoom-modal {

    .editor-modal {

    .canvas-container {

      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .tool-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-family: "Share Tech", sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tool-btn:hover, .tool-btn.active {
      background: linear-gradient(135deg, #fff7c5 0%, #ffd700 100%);
      color: #04043b;
      border-color: #ffd700;
      transform: translateY(-2px);
    }
    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 15px;
      padding-left: 5px;
    }
    .color-picker {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      border: 2px solid rgba(255,255,255,0.5);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      overflow: hidden;
    }
    .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }
    
    .editor-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: flex-end;
    }
    .action-btn {
      padding: 12px 28px;
      border-radius: 16px;

      cursor: pointer;
      font-family: "Share Tech", sans-serif;
      font-size: 16px;
      border: none;

    }
    .action-btn:active { transform: scale(0.98); }
    .action-btn.cancel {

      color: #ff8080;
      border: 1px solid rgba(255, 59, 59, 0.3);
    }
    .action-btn.save {
      background: linear-gradient(135deg, #fff7c5 0%, #ffd700 45%, #ffbb00 100%);
      color: #06072a;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);

    @media (max-width: 850px) {
      .chat-shell { padding-bottom: 140px; }
      .chatBox { max-height: calc(100vh - 300px); }
      .message { max-width: 90%; }
      #controls { flex-wrap: nowrap; }
      .sendButton { width: 40px; }
      .editor-container { padding: 12px; gap: 12px; }
      .tool-btn { padding: 8px 12px; font-size: 13px; }
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, updateDoc, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDL5j0dijH4jNIGqFqJSw1uBRg604ol0RQ",
  authDomain: "chat2-f4a25.firebaseapp.com",
  projectId: "chat2-f4a25",
  storageBucket: "chat2-f4a25.firebasestorage.app",
  messagingSenderId: "1001887999452",
  appId: "1:1001887999452:web:5cda503c3b902c8fb65b19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const name = localStorage.getItem("userName") || "Unknown User";
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "usr_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
  localStorage.setItem("userId", userId);
}

let replyData = null;
let currentMessagesList = [];

const uploadButton = document.getElementById("uploadButton");
const imageInput = document.getElementById("imageInput");
const sendBtn = document.getElementById("sendBtn");
const msgInput = document.getElementById("msgInput");
const cancelReplyBtn = document.getElementById("cancelReply");
const signOutLink = document.getElementById("signOutLink");
const userNameElement = document.getElementById("userName");

const imageZoomModal = document.getElementById("imageZoomModal");
const zoomModalImg = document.getElementById("zoomModalImg");
const closeZoomModal = document.getElementById("closeZoomModal");

// عناصر واجهة التعديل
const editorModal = document.getElementById("editorModal");
const canvasWrapper = document.getElementById("canvasWrapper");
const btnCancelEdit = document.getElementById("btnCancelEdit");
const btnSaveEdit = document.getElementById("btnSaveEdit");
const editorColorInput = document.getElementById("editorColor");

const toolCrop = document.getElementById("toolCrop");
const toolDraw = document.getElementById("toolDraw");
const toolArrow = document.getElementById("toolArrow");
const toolText = document.getElementById("toolText");

let cropperInstance = null;
let fabricCanvas = null;
let currentEditMode = 'crop';
let originalImageSrc = '';

async function init() {
  if (userNameElement) userNameElement.textContent = name;

  try {
    await enableIndexedDbPersistence(db);
    console.log("Offline persistence enabled successfully!");
  } catch (err) {
    if (err.code == 'failed-precondition') {
      console.log("Persistence failed: Multiple tabs open.");
    } else if (err.code == 'unimplemented') {
      console.log("Persistence is not supported by this browser.");
    }
  }
  
  const cached = localStorage.getItem("chatMessagesCache");
  if (cached) {
    try {
      currentMessagesList = JSON.parse(cached);
      renderMessagesHTML(currentMessagesList);
    } catch(e) { console.log(e); }
  }

  try {
    const banRef = doc(db, "bannedUsers", name);
    const banSnap = await getDoc(banRef);
    if (banSnap.exists()) {
      const banData = banSnap.data();
      const bannedReason = banData.reason || banData.messageText || "Violating chat community guidelines.";

      alert("You are banned from chat");
      
      document.body.innerHTML = `
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: radial-gradient(circle at center, #1a0000 0%, #050000 100%); font-family: 'Share Tech', sans-serif; color: #fff; overflow: hidden; position: fixed; top: 0; left: 0; z-index: 99999;">
          <div class="banned-container" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 60, 0.25); backdrop-filter: blur(15px); padding: 40px 50px; border-radius: 28px; text-align: center; max-width: 450px; width: 90%;">
            <div style="font-size: 70px; margin-bottom: 15px;">🚫</div>
            <h1 style="font-size: 42px; color: #ff3b5c; margin: 0 0 15px 0;">SORRY</h1>
            <p style="color: rgba(255,255,255,0.6);">Your account has been banned from accessing the chat.</p>
            <div style="background: rgba(255, 0, 60, 0.08); border: 1px dashed rgba(255, 0, 60, 0.4); padding: 15px; border-radius: 14px; color: #ff8093; text-align: left;">"${bannedReason}"</div>
          </div>
        </div>
      `;
      return;
    }
  } catch (err) {
    console.error("Ban lookup status:", err);
  }

  setupRealtimeMetadataListener(); 
  setupZoomEvents();
  setupEditorEvents();
}

uploadButton.addEventListener("click", () => imageInput.click());

imageInput.addEventListener("change", (e) => {
  const file = e.target.files?.[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    originalImageSrc = event.target.result;
    openEditor(originalImageSrc);
  };
  reader.readAsDataURL(file);
});

function openEditor(imageSrc) {
  editorModal.style.display = "flex";
  currentEditMode = 'crop';
  initCropper(imageSrc);
}

// تنظيف آمن وإعادة بناء كاملة لـ Cropper لمنع التعليق
function initCropper(imageSrc) {
  if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; }
  if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
  
  canvasWrapper.innerHTML = `<img id="cropImage" src="${imageSrc}" style="max-width:100%;">`;
  const image = document.getElementById('cropImage');

  cropperInstance = new Cropper(image, {
    viewMode: 1,
    autoCropArea: 1,
    responsive: true,
    restore: false,
    background: false
  });
  updateToolActiveButton('crop');
}

// تنظيف آمن للمحرر والتحويل إلى نظام رسم الأشكال المستقر
function initFabric(imageSrc) {
  if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
  if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; }
  
  canvasWrapper.innerHTML = `<canvas id="fabricCanvas"></canvas>`;
  
  fabric.Image.fromURL(imageSrc, (img) => {
    const maxWidth = Math.min(window.innerWidth - 60, 700);
    const scale = maxWidth / img.width;
    
    img.set({ scaleX: scale, scaleY: scale });
    
    fabricCanvas = new fabric.Canvas('fabricCanvas', {
      width: img.width * scale,
      height: img.height * scale,
      backgroundImage: img,
      selection: true
    });

    setEditMode(currentEditMode);
  }, { crossOrigin: 'anonymous' });
}

function updateToolActiveButton(mode) {
  document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
  if (mode === 'crop') toolCrop.classList.add('active');
  if (mode === 'draw') toolDraw.classList.add('active');
  if (mode === 'arrow') toolArrow.classList.add('active');
  if (mode === 'text') toolText.classList.add('active');
}

function setEditMode(mode) {
  currentEditMode = mode;
  updateToolActiveButton(mode);
  
  if (mode === 'crop') {
    if (!cropperInstance) {
      if (fabricCanvas) {
        const dataUrl = fabricCanvas.toDataURL({ format: 'jpeg', quality: 0.9 });
        initCropper(dataUrl);
      } else {
        initCropper(originalImageSrc);
      }
    }
    return;
  }

  // إذا كنا سننتقل من القص إلى أداة أخرى، نسحب داتا الصورة المقصوصة أولاً
  if (cropperInstance) {
    const croppedDataUrl = cropperInstance.getCroppedCanvas().toDataURL('image/jpeg');
    initFabric(croppedDataUrl);
    return;
  }

  if (!fabricCanvas) return;

  // إيقاف وتصفير الأحداث السابقة تماماً لمنع التعليق والتداخل
  fabricCanvas.isDrawingMode = false;
  fabricCanvas.off('mouse:down');
  fabricCanvas.forEachObject(obj => obj.selectable = true);

  if (mode === 'draw') {
    fabricCanvas.isDrawingMode = true;
    fabricCanvas.freeDrawingBrush.color = editorColorInput.value;
    fabricCanvas.freeDrawingBrush.width = 5;
  } else if (mode === 'arrow') {
    fabricCanvas.forEachObject(obj => obj.selectable = false);
    setupArrowTool();
  } else if (mode === 'text') {
    fabricCanvas.forEachObject(obj => obj.selectable = false);
    setupTextTool();
  }

  fabricCanvas.calcOffset();
  fabricCanvas.renderAll();
}

function setupArrowTool() {
  fabricCanvas.once('mouse:down', function(o) {
    const pointer = fabricCanvas.getPointer(o.e);
    
    // إنشاء السهم كعنصر مركب متكامل وثابت
    const linePoints = [pointer.x, pointer.y, pointer.x + 60, pointer.y + 40];
    const line = new fabric.Line(linePoints, {
      strokeWidth: 5,
      fill: editorColorInput.value,
      stroke: editorColorInput.value,
      originX: 'center',
      originY: 'center'
    });

    fabricCanvas.add(line);
    fabricCanvas.setActiveObject(line);
    setEditMode('select'); // إرجاعه لوضع التحريك المباشر فوراً لمنع التعليق
  });
}

function setupTextTool() {
  fabricCanvas.once('mouse:down', function(o) {
    const pointer = fabricCanvas.getPointer(o.e);
    const text = new fabric.IText('Type here...', {
      left: pointer.x,
      top: pointer.y,
      fontFamily: 'Share Tech',
      fill: editorColorInput.value,
      fontSize: 26
    });
    fabricCanvas.add(text);
    fabricCanvas.setActiveObject(text);
    text.enterEditing();
    setEditMode('select');
  });
}

function setupEditorEvents() {
  toolCrop.addEventListener('click', () => setEditMode('crop'));
  toolDraw.addEventListener('click', () => setEditMode('draw'));
  toolArrow.addEventListener('click', () => setEditMode('arrow'));
  toolText.addEventListener('click', () => setEditMode('text'));

  editorColorInput.addEventListener('input', (e) => {
    if (fabricCanvas && fabricCanvas.isDrawingMode) {
      fabricCanvas.freeDrawingBrush.color = e.target.value;
    }
  });

  function resetAndClose() {
    editorModal.style.display = "none";
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
    if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; }
    canvasWrapper.innerHTML = '';
    imageInput.value = "";
  }

  btnCancelEdit.addEventListener('click', resetAndClose);

  btnSaveEdit.addEventListener('click', async () => {
    let finalBase64 = '';
    
    if (cropperInstance) {
      finalBase64 = cropperInstance.getCroppedCanvas().toDataURL('image/jpeg', 0.85);
    } else if (fabricCanvas) {
      finalBase64 = fabricCanvas.toDataURL({ format: 'jpeg', quality: 0.85 });
    }

    if (finalBase64) {
      uploadButton.disabled = true;
      resetAndClose();
      await sendMessage({ imageUrl: finalBase64 });
      uploadButton.disabled = false;
    }
  });
}

async function sendMessage({ text = "", imageUrl = null } = {}) {
  const trimmedText = text.trim();
  if (!trimmedText && !imageUrl) return;
  
  try {
    const dataPayload = {
      name: String(name),
      userId: String(userId),
      text: String(trimmedText),
      imageBase64: imageUrl, 
      audioBase64: null,
      time: serverTimestamp(), 
      reply: replyData ? { name: String(replyData.name), text: String(replyData.text) } : null,
      isDeleted: false 
    };

    await addDoc(collection(db, "messages"), dataPayload);
    
    fetch('/new-message-notification', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            senderName: String(name),
            messageText: String(trimmedText),
            senderId: String(userId)
        })
    }).catch(e => console.log("Notification status error:", e));

    msgInput.value = "";
    cancelReply();
  } catch (error) {
    alert("خطأ في إرسال الرسالة");
    console.error(error);
  }
}

sendBtn.addEventListener("click", async (e) => {
  e.preventDefault();
  await sendMessage({ text: msgInput.value });
});

msgInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await sendMessage({ text: msgInput.value });
  }
});

window.deleteMsg = async function (id) {
  try {
    const msgRef = doc(db, "messages", id);
    await updateDoc(msgRef, {
      text: "This message was deleted",
      imageBase64: null,
      audioBase64: null,
      reply: null,
      isDeleted: true
    });
  } catch (error) {
    console.error("Error updating message:", error);
  }
};

window.setReply = function (name, text) {
  replyData = { name, text };
  const preview = document.getElementById("replyPreview");
  if (preview) {
    preview.style.display = "block";
    document.getElementById("replyPreviewName").innerText = "Reply to " + name;
    document.getElementById("replyPreviewText").innerText = text;
  }
};

function cancelReply() {
  replyData = null;
  const preview = document.getElementById("replyPreview");
  if (preview) preview.style.display = "none";
}
cancelReplyBtn.addEventListener("click", cancelReply);

signOutLink.addEventListener("click", (e) => {
  e.preventDefault();
  localStorage.removeItem('savedCode'); 
  window.location.href = 'index.html';
});

window.toggleVoice = function (btn) {
  const voice = btn.closest(".voiceMessage");
  if (!voice) return;
  const audio = voice.querySelector("audio");
  const wave = voice.querySelector(".waveBox");
  const icon = btn.querySelector("span");
  
  document.querySelectorAll("audio").forEach(a => { if (a !== audio) a.pause(); });
  document.querySelectorAll(".waveBox").forEach(w => { if (w !== wave) w.classList.remove("playing"); });
  document.querySelectorAll(".playBtn span").forEach(i => { if (i !== icon) i.innerHTML = "▶"; });
  
  if (audio.paused) {
    audio.play().catch(e => console.log(e));
    if (icon) icon.innerHTML = "❚❚";
    if (wave) wave.classList.add("playing");
  } else {
    audio.pause();
    if (icon) icon.innerHTML = "▶";
    if (wave) wave.classList.remove("playing");
  }
  audio.onended = () => { 
    if (icon) icon.innerHTML = "▶"; 
    if (wave) wave.classList.remove("playing"); 
  };
};

function formatTime(msgDate) {
  return msgDate.toLocaleTimeString('en-US', { 
    timeZone: 'Africa/Cairo', 
    hour: '2-digit', 
    minute: '2-digit', 
    hour12: true 
  });
}

function getDayLabel(date) {
  const now = new Date();
  const cairoToday = new Date(now.toLocaleString("en-US", {timeZone: "Africa/Cairo"}));
  const cairoMsgDay = new Date(date.toLocaleString("en-US", {timeZone: "Africa/Cairo"}));
  
  const today = new Date(cairoToday.getFullYear(), cairoToday.getMonth(), cairoToday.getDate());
  const msgDay = new Date(cairoMsgDay.getFullYear(), cairoMsgDay.getMonth(), cairoMsgDay.getDate());
  
  const diff = Math.round((msgDay - today) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'Today';
  if (diff === -1) return 'Yesterday';
  return date.toLocaleDateString('en-US', { timeZone: 'Africa/Cairo', weekday: 'long' });
}

function setupZoomEvents() {
  let scale = 1;
  let pointX = 0, pointY = 0, startX = 0, startY = 0, isPanning = false;

  function updateTransform() {
    zoomModalImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
  }

  function resetZoom() {
    scale = 1;
    pointX = 0;
    pointY = 0;
    updateTransform();
    imageZoomModal.style.display = "none";
  }

  closeZoomModal.addEventListener("click", resetZoom);
  imageZoomModal.addEventListener("click", (e) => {
    if (e.target !== zoomModalImg) resetZoom();
  });

  imageZoomModal.addEventListener("wheel", (e) => {
    e.preventDefault();
    const xs = (e.clientX - pointX) / scale;
    const ys = (e.clientY - pointY) / scale;
    const delta = e.deltaY ? -e.deltaY : e.wheelDelta;
    
    if (delta > 0) {
      if (scale < 6) scale += 0.25; 
    } else {
      if (scale > 1) scale -= 0.25;
    }

    pointX = e.clientX - xs * scale;
    pointY = e.clientY - ys * scale;
    updateTransform();
  });

  zoomModalImg.addEventListener("mousedown", (e) => {
    e.preventDefault();
    startX = e.clientX - pointX;
    startY = e.clientY - pointY;
    isPanning = true;
  });

  window.addEventListener("mousemove", (e) => {
    if (!isPanning) return;
    pointX = e.clientX - startX;
    pointY = e.clientY - startY;
    updateTransform();
  });

  window.addEventListener("mouseup", () => {
    isPanning = false;
  });

  zoomModalImg.addEventListener("touchstart", (e) => {
    if (e.touches.length === 1) {
      isPanning = true;
      startX = e.touches[0].clientX - pointX;
      startY = e.touches[0].clientY - startY;
    }
  });

  zoomModalImg.addEventListener("touchmove", (e) => {
    if (!isPanning || e.touches.length !== 1) return;
    pointX = e.touches[0].clientX - startX;
    pointY = e.touches[0].clientY - startY;
    updateTransform();
  });

  zoomModalImg.addEventListener("touchend", () => {
    isPanning = false;
  });
}

window.openImageZoom = function(src) {
  zoomModalImg.src = src;
  imageZoomModal.style.display = "flex";
};

function renderMessagesHTML(messagesList) {
  const box = document.getElementById("chatBox");
  if (!box) return;
  box.innerHTML = "";
  let prevDay = null;
  
  messagesList.forEach(data => {
    let msgDate;
    if (data.time && typeof data.time.toDate === 'function') {
      msgDate = data.time.toDate();
    } else if (data.time && data.time.seconds) {
      msgDate = new Date(data.time.seconds * 1000);
    } else if (data.time) {
      msgDate = new Date(data.time);
    } else {
      msgDate = new Date();
    }

    const dayKey = msgDate.toLocaleDateString('en-US', { timeZone: 'Africa/Cairo' });
    if (prevDay !== dayKey) {
      const separator = document.createElement('div');
      separator.className = 'daySeparator';
      separator.textContent = getDayLabel(msgDate);
      box.appendChild(separator);
      prevDay = dayKey;
    }
    const isMe = data.userId === userId;
    const wrapper = document.createElement('div');
    wrapper.className = `messageWrapper ${isMe ? 'me' : 'other'}`;
    const message = document.createElement('div');
    message.className = `message ${isMe ? 'me' : 'other'}`;
    const author = document.createElement('span');
    author.className = 'author';
    author.textContent = data.name || "Anonymous";
    const content = document.createElement('div');
    content.className = 'content';
    
    if (data.imageBase64) {
      const image = document.createElement('img');
      image.src = data.imageBase64;
      image.alt = 'Uploaded image';
      image.onclick = () => window.openImageZoom(data.imageBase64);
      content.appendChild(image);
    }
    if (data.text) {
      const textEl = document.createElement('div');
      textEl.textContent = data.text;
      textEl.setAttribute('dir', 'auto'); // الإصلاح هنا لتوجيه النص تلقائياً ومنع تداخل الإنجليزية
      if (data.isDeleted) {
        textEl.className = 'deleted-message';
      }
      content.appendChild(textEl);
    }
    if (data.audioBase64) {
      const audioWrapper = document.createElement('div');
      audioWrapper.className = 'audioMessage';
      audioWrapper.innerHTML = `<button class="playBtn" type="button" onclick="toggleVoice(this)"><span>▶</span></button><audio src="${data.audioBase64}" class="hiddenAudio"></audio>`;
      content.appendChild(audioWrapper);
    }
    if (data.reply) {
      const replyBlock = document.createElement('div');
      replyBlock.className = 'replyBlock';
      replyBlock.innerHTML = `<span class="replyLabel">Reply to ${data.reply.name}</span><span class="replyText" dir="auto">${data.reply.text || '[Voice message]'}</span>`; // الإصلاح للردود هنا
      message.appendChild(replyBlock);
    }
    
    const meta = document.createElement('div');
    meta.className = 'meta';
    const timeTag = document.createElement('span');
    timeTag.className = 'timeTag';
    timeTag.textContent = formatTime(msgDate);
    meta.appendChild(timeTag);
    
    if (isMe && !data.isDeleted) {
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'small-delete-btn';
      deleteBtn.type = 'button';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = (e) => {
        e.stopPropagation();
        deleteMsg(data.id);
      };
      meta.appendChild(deleteBtn);
    }
    
    message.appendChild(author);
    message.appendChild(content);
    message.appendChild(meta);
    
    if (!data.isDeleted) {
      message.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        setReply(data.name || "Anonymous", data.text || '[Image message]');
      });
    }
    wrapper.appendChild(message);
    box.appendChild(wrapper);
  });
  
  if (box.lastElementChild) {
    box.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }
}

function setupRealtimeMetadataListener() {
  const q = query(collection(db, "messages"), orderBy("time", "desc"), limit(40));
  
  onSnapshot(q, { includeMetadataChanges: true }, (snapshot) => {
    const messages = [];
    snapshot.forEach(docSnap => {
      messages.push({ id: docSnap.id, ...docSnap.data() });
    });
    messages.reverse();
    
    currentMessagesList = messages;
    localStorage.setItem("chatMessagesCache", JSON.stringify(messages));
    
    renderMessagesHTML(messages);
  }, (error) => {
    console.error("Snapshot connection error:", error);
  });
}

init();
</script>
