<html>
  <head>
    <meta charset="UTF-8">
    <title>SIGN IN PAGE</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
      .mode-toggle-container {
        display: flex;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 30px;
        padding: 4px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        width: 100%;
        box-sizing: border-box;
        overflow: hidden;
      }

      .slider-bg {
        position: absolute;
        top: 4px;
        left: 4px;
        width: calc(50% - 4px);
        height: calc(100% - 8px);
        background: linear-gradient(135deg, #ffe46b 0%, #ffd700 45%, #ffef99 100%);
        border-radius: 25px;
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        z-index: 1;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      }

      .mode-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: #888;
        padding: 12px 0;
        font-family: 'Share Tech', sans-serif;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        border-radius: 25px;
        position: relative;
        z-index: 2;
        transition: color 0.4s ease;
      }

      .mode-btn.active {
        color: rgb(0, 0, 103) !important;
      }

      .mode-toggle-container.parent-active .slider-bg {
        transform: translateX(100%);
      }
      #tt {
        color: gold;
      }
    </style>
      <!-- Settings System Initializer -->
    <script>
      (function() {
        const theme = localStorage.getItem('settings-theme') || 'dark';
        const accent = localStorage.getItem('settings-accent') || 'gold';
        const fontSize = localStorage.getItem('settings-fontSize') || 'normal';
        const sidebarSide = localStorage.getItem('settings-sidebarSide') || 'right';
        const animations = localStorage.getItem('settings-animations') || 'normal';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-accent', accent);
        document.documentElement.setAttribute('data-font-size', fontSize);
        document.documentElement.setAttribute('data-sidebar-side', sidebarSide);
        document.documentElement.setAttribute('data-animations', animations);
      })();
    </script>
    <script src="settings.js" defer></script>
</head>
  <body>
    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="upbox">
      &nbsp;&nbsp;&nbsp;&nbsp;<div class="hh"><img src="logo.png" width="70px" alt="Logo"></div>
      <span class="brand-name">AMR SAKR</span>
      <div class="upboxs">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
          <img src="menu.png" width="60px" alt="Menu">
        </button>
      </div>
    </div>

    <aside id="sideMenu" class="side-menu" aria-label="Main menu">
      <button id="closeMenu" class="close-menu" type="button" aria-label="Close menu"><span class="material-symbols-rounded">close</span></button>
      <h2>AMR SAKR</h2>
      <a href="device-detect.html"><span class="material-symbols-rounded menu-icon">download</span>DOWNLOAD AS AN APP</a>
<a href="index.html"><span class="material-symbols-rounded menu-icon">home</span>HOME</a>
      <a href="contact.html"><span class="material-symbols-rounded menu-icon">mail</span>CONTACT</a>
      <a href="designer.html"><span class="material-symbols-rounded menu-icon">brush</span>THE WEB DESIGNER</a>
      <a href="#" onclick="localStorage.removeItem('savedCode'); localStorage.removeItem('userRole');"><span class="material-symbols-rounded menu-icon">logout</span>SIGN OUT</a>
    </aside>

    <main class="hero-wrap">
      <section class="hero-card hero-split code-card">
        <article class="hero-visual">
          <p class="eyebrow">ENTER YOUR ID</p>
          <img src="logo.png" width="350px" id="mlogo" alt="AMR SAKR logo">
          <h1 class="hero-title">AMR SAKR</h1>
          <p class="hero-text">Enter your ID to continue and access your sessions.</p>
        </article>

        <aside class="hero-actions code-actions">
          <div class="btn-group">
            
            <div class="mode-toggle-container" id="toggleContainer">
              <div class="slider-bg"></div>
              <button type="button" class="mode-btn active" id="btnStudents" onclick="setRole('students')">STUDENT</button>
              <button type="button" class="mode-btn" id="btnParents" onclick="setRole('parents')">PARENT</button>
            </div>

            <label class="code-label" for="text" id="inputLabel">ID</label>
            <input class="code-input" type="text" id="text" placeholder="Enter your ID">
            <button class="btn" type="button" onclick="go()">CONFIRM</button>
            
            <p class="code-note">Your ID will be saved for your next visit.</p><br><br><br>
            <center> <a href="v.b.html" id="tt">Forgot My ID</a></center>
          </div>
        </aside>
      </section>
    </main>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');
  const textInput = document.getElementById('text');

  function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeMenuPanel() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenu) closeMenu.addEventListener('click', closeMenuPanel);
  if (overlay) overlay.addEventListener('click', closeMenuPanel);

  let currentRole = 'students';
  function setRole(role) {
    currentRole = role;
    const container = document.getElementById('toggleContainer');
    
    if (role === 'parents') {
      container.classList.add('parent-active');
      document.getElementById('btnStudents').classList.remove('active');
      document.getElementById('btnParents').classList.add('active');
      textInput.placeholder = 'Enter your student ID';
    } else {
      container.classList.remove('parent-active');
      document.getElementById('btnParents').classList.remove('active');
      document.getElementById('btnStudents').classList.add('active');
      textInput.placeholder = 'Enter your ID';
    }
  }

  // التوجيه التلقائي الذكي عند فتح الصفحة بناءً على الدور المحفوظ
  const savedCode = localStorage.getItem('savedCode');
  const savedRole = localStorage.getItem('userRole') || 'students';
  if (savedCode) {
    if (savedRole === 'parents') {
      window.location.href = 'loading1.html?code=' + encodeURIComponent(savedCode);
    } else {
      window.location.href = 'loading2.html?code=' + encodeURIComponent(savedCode);
    }
  }

  function go() {
    const code = textInput.value.trim();

    if (code) {
      localStorage.setItem('savedCode', code);
      localStorage.setItem('userRole', currentRole); 

      if (currentRole === 'parents') {
        window.location.href = 'loading1.html?code=' + encodeURIComponent(code);
      } else {
        window.location.href = 'loading2.html?code=' + encodeURIComponent(code);
      }
    } else {
      alert('please enter your code');
    }
  }
</script>
</body>
</html>
