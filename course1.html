    function getYouTubeId(link) {
      if (!link) return "";
      const trimmed = link.trim();

      try {
        const url = new URL(trimmed);
        const host = url.hostname.replace(/^www\./, "");

        if (host === "youtube.com" || host === "m.youtube.com") {
          if (url.searchParams.get("v")) return url.searchParams.get("v");
          if (url.pathname.startsWith("/embed/")) return url.pathname.split("/")[2];
          if (url.pathname.startsWith("/shorts/")) return url.pathname.split("/")[2];
          if (url.pathname.startsWith("/live/")) return url.pathname.split("/")[2];
        }

        if (host === "youtu.be") {
          return url.pathname.replace("/", "");
        }
      } catch (error) {
        // fallback below
      }

      const patterns = [
        /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|m\.youtube\.com\/watch\?v=)([A-Za-z0-9_-]{11})/i,
        /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/live\/)([A-Za-z0-9_-]{11})/i,
        /[?&]v=([A-Za-z0-9_-]{11})/i
      ];

      for (const pattern of patterns) {
        const match = trimmed.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      return "";
    }

    function makeCard(data, id) {
      const card = document.createElement("article");
      card.className = "course-card";

      const viewsLeft = Number(data.viewsLeft ?? data.viewsLimit ?? 4);
      const isUnlimited = Boolean(data.unlimitedViews) || Number(data.viewsLimit ?? 0) === 0;
      const buttonLabel = isUnlimited || viewsLeft > 0 ? "WATCH" : "NO VIEWS LEFT";
      const viewsLabel = isUnlimited ? "NOT LIMITED" : `${viewsLeft} ${viewsLeft === 1 ? 'VIEW' : 'VIEWS'} LEFT`;

      card.innerHTML = `
       
        <img src="${data.image || 'logo.png'}" alt="${data.name || 'Lesson'}">
        <h3>${data.name || 'Untitled lesson'}</h3>
        <p>${data.link ? 'Tap the button below to open the lesson video.' : 'No video link is available yet.'}</p>
        <p class="course-pill">${viewsLabel}</p>
        <button class="btn" type="button" ${data.link ? '' : 'disabled'}>${buttonLabel}</button>
      `;

      const btn = card.querySelector("button");
      btn.addEventListener("click", () => openVideo(data.link, id, viewsLeft, isUnlimited));
      return card;
    }

    async function loadButtons() {
      try {
        container.innerHTML = "";
        const snap = await getDocs(collection(db, "course1_lessons"));
        
        let lessonsList = [];
        snap.forEach((item) => {
          const data = item.data();
          lessonsList.push({
            id: item.id,
            data: data,
            time: data.createdAt || 0 // الدروس القديمة التي بدون توقيت تأخذ 0
          });
        });

        // ترتيب تنازلي: الدرس الحاصل على توقيت أكبر (الأحدث) يظهر أولاً فوق
        lessonsList.sort((a, b) => b.time - a.time);

        // بناء الحصص في الصفحة بعد الترتيب
        lessonsList.forEach((lesson) => {
          container.appendChild(makeCard(lesson.data, lesson.id));
        });
        
      } catch (error) {
        console.error("Error loading lessons:", error);
      }
    }

    function formatTime(seconds) {
      const safe = Number.isFinite(seconds) ? Math.max(0, Math.floor(seconds)) : 0;
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function ensureYouTubeApi(callback) {
      if (window.YT && window.YT.Player) {
        callback();
        return;
      }

      if (!document.getElementById("yt-iframe-api")) {
        const script = document.createElement("script");
        script.id = "yt-iframe-api";
        script.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(script);
      }

      const previousReady = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = function () {
        if (previousReady) previousReady();
        callback();
      };
    }

    window.showNoViewsMessage = function (lessonName) {
      const wrapper = document.createElement("div");
      wrapper.className = "video-overlay";
      const alertTitle = lessonName || "this lesson";
      wrapper.innerHTML = `
        <div class="video-panel" style="max-width: 560px; border: 1px solid rgba(255,255,255,0.22); box-shadow: 0 22px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.16);">
          <div class="video-topbar" style="padding-bottom: 4px;">
            <div class="player-title"><span class="panel-dot"></span>lesson access</div>
            <button class="video-close" type="button" aria-label="Close message">×</button>
          </div>
          <div style="padding: 28px 24px 30px; color: #fff; text-align: center; background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06)); border-radius: 20px;">
            <div style="width: 84px; height: 84px; margin: 0 auto 14px; border-radius: 50%; display: grid; place-items: center; background: linear-gradient(135deg, rgba(255,190,61,0.3), rgba(255,106,61,0.3)); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 0 32px rgba(255,190,61,0.24); font-size: 34px; font-weight: 800; color: #ffe7a2; letter-spacing: 0.02em;">!</div>
            <h3 style="margin: 0 0 10px; font-size: 24px; font-weight: 800; letter-spacing: 0.03em;">Access stopped</h3>
            <p style="margin: 0 0 10px; font-size: 16px; line-height: 1.7; color: rgba(255,255,255,0.92);">
              You have no views left for <strong style="color: #ffe7a2;">${alertTitle}</strong>.
            </p>
            <p style="margin: 0 0 14px; font-size: 14px; color: rgba(255,255,255,0.78);">
              Please contact the teacher to unlock more access.
            </p>
            <button class="btn" type="button" style="min-height: 44px; border-radius: 999px; padding: 0 18px; font-size: 15px; margin-top: 4px;" data-role="close-popup">Close</button>
          </div>
        </div>
      `;

      const closeBtn = wrapper.querySelector(".video-close");
      const actionBtn = wrapper.querySelector('[data-role="close-popup"]');
      const closeOverlay = () => {
        wrapper.remove();
        document.body.style.overflow = "";
      };

      const playAlertTone = () => {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          const context = new AudioContextClass();
          const oscillator = context.createOscillator();
          const gainNode = context.createGain();
          oscillator.type = "triangle";
          oscillator.frequency.setValueAtTime(760, context.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(540, context.currentTime + 0.18);
          gainNode.gain.setValueAtTime(0.0001, context.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.16, context.currentTime + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.24);
          oscillator.connect(gainNode);
          gainNode.connect(context.destination);
          oscillator.start();
          oscillator.stop(context.currentTime + 0.25);
          setTimeout(() => context.close().catch(() => {}), 400);
        } catch (error) {
          console.warn("Alert sound unavailable", error);
        }
      };

      closeBtn?.addEventListener("click", closeOverlay);
      actionBtn?.addEventListener("click", closeOverlay);
      wrapper.addEventListener("click", (event) => {
        if (event.target === wrapper) closeOverlay();
      });
      document.body.appendChild(wrapper);
      document.body.style.overflow = "hidden";
      playAlertTone();
    };

    window.openVideo = function (link, docId, viewsLeft, isUnlimited) {
      if (!isUnlimited && viewsLeft <= 0) {
        window.showNoViewsMessage("this lesson");
        return;
      }

      const videoId = getYouTubeId(link);

      if (!link || !link.trim()) {
        alert("This video link is invalid. Please update it in the admin panel.");
        return;
      }

      if (!videoId) {
        alert("This link is not a valid YouTube video link.");
        return;
      }

      const studentBadge = (localStorage.getItem("userId") || localStorage.getItem("savedCode") || "ID").toString().trim();
      const wrapper = document.createElement("div");
      wrapper.className = "video-overlay";
      wrapper.innerHTML = `
        <div class="video-panel">
          <div class="video-topbar">
            <div class="player-title"><span class="panel-dot"></span>lesson player</div>
            <button class="video-close" type="button" aria-label="Close video">×</button>
          </div>
          <div class="video-stage">
            <div class="video-loading-line" aria-hidden="true"></div>
            <iframe
              id="lesson-player-${docId}"
              src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&controls=0&fs=0&playsinline=1&enablejsapi=1&showinfo=0&iv_load_policy=3&disablekb=1&autohide=1&cc_load_policy=0"
              title="Lesson video"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              loading="lazy"></iframe>
            <div class="video-control-bar">
              <div class="control-group">
                <button class="control-btn skip-btn" data-action="back10" type="button">◀◀</button>
                <button class="control-btn" data-action="toggle" type="button">▶</button>
                <button class="control-btn skip-btn" data-action="forward10" type="button">▶▶</button>
                <span class="time-label" data-role="current">00:00</span>
                <input class="progress-slider" type="range" min="0" max="100" value="0" />
                <span class="time-label" data-role="duration">00:00</span>
              </div>
              <div class="control-group">
                <div class="settings-menu">
                  <button class="control-btn settings-trigger" data-action="settings" type="button" aria-label="Open playback settings" aria-expanded="false">
                    <span class="material-symbols-rounded">settings</span>
                  </button>
                  <div class="settings-popup" role="menu" aria-label="Playback settings">
                    <div class="settings-row">
                      <span>Playback speed</span>
                      <div class="settings-group">
                        <button class="settings-btn speed-btn" data-speed="0.75" type="button">0.75×</button>
                        <button class="settings-btn speed-btn is-active" data-speed="1" type="button">1×</button>
                        <button class="settings-btn speed-btn" data-speed="1.25" type="button">1.25×</button>
                        <button class="settings-btn speed-btn" data-speed="1.5" type="button">1.5×</button>
                        <button class="settings-btn speed-btn" data-speed="2" type="button">2×</button>
                      </div>
                    </div>
                  </div>
                </div>
                <button class="control-btn" data-action="mute" type="button"><span class="material-symbols-rounded">volume_up</span></button>
                <button class="control-btn" data-action="fullscreen" type="button"><span class="material-symbols-rounded">fullscreen</span></button>
              </div>
            </div>
            <div class="student-flow-badge">${studentBadge}</div>
          </div>
        </div>
      `;

      const closeBtn = wrapper.querySelector(".video-close");
      const playToggle = wrapper.querySelector('[data-action="toggle"]');
      const muteToggle = wrapper.querySelector('[data-action="mute"]');
      const fullscreenToggle = wrapper.querySelector('[data-action="fullscreen"]');
      const back10Btn = wrapper.querySelector('[data-action="back10"]');
      const forward10Btn = wrapper.querySelector('[data-action="forward10"]');
      const progressSlider = wrapper.querySelector(".progress-slider");
      const currentLabel = wrapper.querySelector('[data-role="current"]');
      const durationLabel = wrapper.querySelector('[data-role="duration"]');
      const settingsTrigger = wrapper.querySelector(".settings-trigger");
      const settingsPopup = wrapper.querySelector(".settings-popup");
      const playerId = `lesson-player-${docId}`;
      const fullscreenPanel = wrapper.querySelector(".video-panel");
      let player = null;
      let timer = null;
      let playerReady = false;
      let currentSpeed = 1;
      let watchSessionStarted = false;
      let watchSessionSeconds = 0;
      let watchSessionDeducted = false;
      let watchSessionTimer = null;
      const stage = wrapper.querySelector(".video-stage");

      function setLoadingVisual(state) {
        if (!stage) return;
        const buffering = state === window.YT?.PlayerState?.BUFFERING;
        const paused = state === window.YT?.PlayerState?.PAUSED;
        const playing = state === window.YT?.PlayerState?.PLAYING;
        stage.classList.toggle("is-loading", buffering);
        stage.classList.toggle("is-paused", paused && !playing);
        if (playing || state === window.YT?.PlayerState?.ENDED || state === window.YT?.PlayerState?.CUED) {
          stage.classList.remove("is-loading", "is-paused");
        }
      }

      function updateSpeedButtons() {
        wrapper.querySelectorAll(".speed-btn").forEach((btn) => {
          btn.classList.toggle("is-active", Number(btn.dataset.speed) === currentSpeed);
        });
      }

      function setSettingsMenuOpen(isOpen) {
        settingsPopup?.classList.toggle("is-open", isOpen);
        settingsTrigger?.setAttribute("aria-expanded", isOpen ? "true" : "false");
      }

      function applyPlaybackRate(rate) {
        currentSpeed = rate;
        updateSpeedButtons();
        if (player && typeof player.setPlaybackRate === "function") {
          try { player.setPlaybackRate(rate); } catch (error) { console.error(error); }
        }
      }

      function destroyPlayer() {
        if (timer) clearInterval(timer);
        if (watchSessionTimer) clearInterval(watchSessionTimer);
        if (player && typeof player.destroy === "function") {
          try { player.destroy(); } catch (error) { console.error(error); }
        }
        wrapper.remove();
        document.body.style.overflow = "";
      }

      function syncProgress() {
        if (!player || !playerReady || typeof player.getCurrentTime !== "function") return;
        const currentTime = player.getCurrentTime();
        const totalTime = player.getDuration();
        if (Number.isFinite(currentTime)) currentLabel.textContent = formatTime(currentTime);
        if (Number.isFinite(totalTime) && totalTime > 0) {
          durationLabel.textContent = formatTime(totalTime);
          const percent = (currentTime / totalTime) * 100;
          progressSlider.value = Number.isFinite(percent) ? percent : 0;
        }
      }

      function syncPlayState() {
        if (!player || typeof player.getPlayerState !== "function") return;
        const state = player.getPlayerState();
        const isPlaying = state === window.YT?.PlayerState?.PLAYING;
        playToggle.textContent = isPlaying ? "❚❚" : "▶";
      }

      closeBtn.addEventListener("click", destroyPlayer);
      wrapper.addEventListener("click", (event) => {
        if (event.target === wrapper) {
          destroyPlayer();
        } else if (!event.target.closest(".settings-menu")) {
          setSettingsMenuOpen(false);
        }
      });
      settingsTrigger?.addEventListener("click", (event) => {
        event.stopPropagation();
        setSettingsMenuOpen(!settingsPopup?.classList.contains("is-open"));
      });
      wrapper.querySelectorAll(".speed-btn").forEach((btn) => {
        btn.addEventListener("click", () => applyPlaybackRate(Number(btn.dataset.speed)));
      });
      updateSpeedButtons();
      playToggle.addEventListener("click", () => {
        if (!player || typeof player.getPlayerState !== "function") return;
        const state = player.getPlayerState();
        if (state === window.YT?.PlayerState?.PLAYING) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      });
      back10Btn.addEventListener("click", () => {
        if (!player || typeof player.getCurrentTime !== "function") return;
        const target = Math.max(0, player.getCurrentTime() - 10);
        player.seekTo(target, true);
        syncProgress();
      });
      forward10Btn.addEventListener("click", () => {
        if (!player || typeof player.getCurrentTime !== "function") return;
        const total = player.getDuration() || 0;
        const target = Math.min(total, player.getCurrentTime() + 10);
        player.seekTo(target, true);
        syncProgress();
      });
      muteToggle.addEventListener("click", () => {
        if (!player) return;
        if (player.isMuted()) {
          player.unMute();
          muteToggle.innerHTML = '<span class="material-symbols-rounded">volume_up</span>';
        } else {
          player.mute();
          muteToggle.innerHTML = '<span class="material-symbols-rounded">volume_off</span>';
        }
      });
      fullscreenToggle.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          fullscreenPanel?.requestFullscreen?.({ navigationUI: "hide" }).catch(() => wrapper.requestFullscreen?.());
        } else {
          document.exitFullscreen?.();
        }
      });
      document.addEventListener("fullscreenchange", () => {
        if (!fullscreenPanel) return;
        fullscreenPanel.classList.toggle("is-fullscreen", Boolean(document.fullscreenElement));
        const icon = document.fullscreenElement ? "fullscreen_exit" : "fullscreen";
        fullscreenToggle.innerHTML = `<span class="material-symbols-rounded">${icon}</span>`;
      });
      progressSlider.addEventListener("input", () => {
        if (!player || typeof player.seekTo !== "function") return;
        const total = player.getDuration() || 1;
        const seekTo = (Number(progressSlider.value) / 100) * total;
        player.seekTo(seekTo, true);
      });

      document.body.appendChild(wrapper);
      document.body.style.overflow = "hidden";

      const watchGuardKey = `watched_${docId}`;
      const watchSessionKey = `${watchGuardKey}_session`;
      const alreadyRecorded = localStorage.getItem(watchGuardKey);
      const startedFromLocal = localStorage.getItem(watchSessionKey);
      if (alreadyRecorded) {
        watchSessionDeducted = true;
      }

      function attemptViewDeduction() {
        if (watchSessionDeducted || watchSessionSeconds < 30 * 60 || viewsLeft <= 0) return;
        if (localStorage.getItem(watchGuardKey)) {
          watchSessionDeducted = true;
          return;
        }
        watchSessionDeducted = true;
        localStorage.setItem(watchGuardKey, "true");
        const ref = doc(db, "course1_lessons", docId);
        updateDoc(ref, { viewsLeft: increment(-1) })
          .then(() => {
            alert(`One view was deducted from this lesson.\n\nRemaining views: ${Math.max(0, viewsLeft - 1)}`);
            loadButtons();
          })
          .catch((error) => {
            console.error("Failed to decrement lesson view:", error);
            localStorage.removeItem(watchGuardKey);
            watchSessionDeducted = false;
          });
      }

      watchSessionTimer = setInterval(() => {
        if (!playerReady || !player || typeof player.getCurrentTime !== "function") return;
        const currentTime = Number(player.getCurrentTime() || 0);
        const duration = Number(player.getDuration() || 0);
        if (!Number.isFinite(currentTime) || !Number.isFinite(duration) || duration <= 0) return;
        if (!watchSessionStarted) {
          watchSessionStarted = true;
          watchSessionSeconds = 0;
        }
        watchSessionSeconds = Math.max(watchSessionSeconds, Math.floor(currentTime));
        if (watchSessionSeconds >= 30 * 60) {
          attemptViewDeduction();
          if (watchSessionTimer) clearInterval(watchSessionTimer);
        }
      }, 1000);

      ensureYouTubeApi(() => {
        player = new window.YT.Player(playerId, {
          videoId,
          playerVars: {
            autoplay: 1,
            rel: 0,
            modestbranding: 1,
            controls: 0,
            fs: 1,
            playsinline: 1,
            enablejsapi: 1
          },
          events: {
            onReady: () => {
              playerReady = true;
              stage?.classList.add("is-loading");
              player.playVideo();
              syncPlayState();
              syncProgress();
              timer = setInterval(syncProgress, 250);
            },
            onStateChange: (event) => {
              setLoadingVisual(event.data);
              syncPlayState();
            }
          }
        });
      });
    };

    loadButtons();
  </script>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    const closeMenu = document.getElementById('closeMenu');

    function openMenu() {
      sideMenu.classList.add('open');
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeMenuPanel() {
      sideMenu.classList.remove('open');
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }

    if (menuBtn) menuBtn.addEventListener('click', openMenu);
    if (closeMenu) closeMenu.addEventListener('click', closeMenuPanel);
    if (overlay) overlay.addEventListener('click', closeMenuPanel);
    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') closeMenuPanel();
    });
  </script>
</body>
</html>
