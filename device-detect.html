<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Setup & Download</title>
  
  <link rel="manifest" href="manifest.json">
  
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    body {
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Share Tech", sans-serif;
      position: relative;
     background: radial-gradient(circle at top, rgba(255, 255, 255, 0.22), transparent 12%), radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.14), transparent 18%), radial-gradient(circle at 80% 0%, rgba(124, 58, 237, 0.25), transparent 20%), linear-gradient(145deg, #04043b 0%, #06066b 30%, #01011f 65%, #00000e 100%);
      color: #fff;
    }

   

    @keyframes floatGlow {
      from { transform: scale(1); }
      to { transform: scale(1.05) translate(10px, -10px); }
    }

    /* 📱 الكرت الرئيسي - متجاوب بالكامل ومعزز للموبايل */
    .detect-shell {
      width: min(90vw, 540px);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 1px rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 24px 30px;
      text-align: center;
      color: #fff;
      box-sizing: border-box;
      animation: cardRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detect-logo {
      width: 90px;
      height: auto;
      margin-bottom: 16px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
    }

    .detect-title {
      font-size: 28px;
      margin: 0 0 6px;
      color: #ffffff;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .detect-subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      margin: 0 0 30px;
      line-height: 1.5;
      padding: 0 10px;
    }

    /* ⚡ أزرار احترافية بتأثيرات ضغط ممتازة للموبايل */
    .detect-btn, .download-btn {
      position: relative;
      width: 100%;
      background: linear-gradient(135deg, #fff3a8 0%, #ffd700 50%, #cca300 100%);
      color: #04043b;
      border: none;
      border-radius: 16px;
      min-height: 60px;
      font-size: 20px;
      font-family: "Share Tech", sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent; /* منع الوميض الأزرق الافتراضي في الموبايل */
    }

    .detect-btn:hover, .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 215, 0, 0.35);
    }

    .detect-btn:active, .download-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .detect-btn:disabled {
      cursor: wait;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: none;
      transform: none !important;
    }

    /* ⏳ نظام التحميل المتطور والأنيق */
    .progress-wrapper {
      display: none;
      margin: 25px 0;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      box-shadow: 0 0 15px #ffd700;
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    .percentage-counter {
      font-size: 24px;
      color: #ffd700;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detect-status {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 10px;
      min-height: 22px;
    }

    /* 📥 شاشة النتيجة وزر التحميل النهائي */
    .result-container {
      display: none;
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .device-info-box {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      color: #ffd700;
    }
  </style>
</head>
<body>

  <div class="detect-shell">
    <img src="logo.png" alt="AMR SAKR logo" class="detect-logo">
    <h1 class="detect-title">App Installer</h1>
    <p class="detect-subtitle">Get the optimized standalone application version tailored exactly for your hardware device.</p>
    
    <button class="detect-btn" id="detectBtn">
      <span class="material-symbols-rounded">developer_board</span>
      Detect Device Type
    </button>
    
    <div class="progress-wrapper" id="progressWrapper">
      <div class="percentage-counter" id="percentText">0%</div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="detect-status" id="status">System Engine: Ready</div>

    <div class="result-container" id="resultContainer">
      <button class="download-btn" id="downloadBtn">
        <span class="material-symbols-rounded" id="downloadIcon">download</span>
        <span id="downloadText">Download App</span>
      </button>
      <br>
      <div class="device-info-box">
        <span class="material-symbols-rounded" style="font-size: 16px;">info</span>
        <span id="deviceDetails"></span>
      </div>
    </div>
    
    <br>
    <a href="index.html" class="back-link">Return to Homepage</a>
  </div>

  <script>
    // ⚙️ تسجيل الـ Service Worker لتهيئة ملفات الـ PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW Registered'))
          .catch(err => console.log('SW Failed', err));
      });
    }

    // 📥 التقاط أمر التثبيت الحقيقي من المتصفح
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    const detectBtn = document.getElementById('detectBtn');
    const progressWrapper = document.getElementById('progressWrapper');
    const progressBar = document.getElementById('progressBar');
    const percentText = document.getElementById('percentText');
    const statusEl = document.getElementById('status');
    const resultContainer = document.getElementById('resultContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadText = document.getElementById('downloadText');
    const downloadIcon = document.getElementById('downloadIcon');
    const deviceDetails = document.getElementById('deviceDetails');

    // دالة الفحص الذكي لتحديد نوع الأيقونة ونوع الجهاز
    function analyzeDevice() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const ua = navigator.userAgent || '';
      
      const isTablet = (/iPad|Android/i.test(ua) && !/Mobile/i.test(ua)) || (width >= 768 && width < 1200);
      const isMobile = /Mobi|Android|iPhone|iPod|Mobile/i.test(ua) || width < 768;
      
      if (isTablet) {
        return { text: 'Download for Tablet', icon: 'tablet_mac', info: `Tablet Config (${width}x${height})` };
      } else if (isMobile) {
        return { text: 'Download for Mobile', icon: 'smartphone', info: `Mobile Config (${width}x${height})` };
      } else {
        return { text: 'Download for PC', icon: 'desktop_windows', info: `Desktop Config (${width}x${height})` };
      }
    }

    detectBtn.addEventListener('click', () => {
      detectBtn.disabled = true;
      statusEl.textContent = 'Initializing core hardware diagnostics...';
      statusEl.style.color = '#ffd700';
      
      resultContainer.style.display = 'none';
      progressWrapper.style.display = 'block';

      let start = null;
      const duration = 10000; // 10 ثوانٍ كاملة

      function animateProgress(timestamp) {
        if (!start) start = timestamp;
        const progress = timestamp - start;
        const percentage = Math.min((progress / duration) * 100, 100);
        
        // تحديث النسبة المئوية وشريط التحميل
        progressBar.style.width = percentage + '%';
        percentText.textContent = Math.floor(percentage) + '%';
        
        // تبديل نصوص الحالة بشكل تقني واحترافي ممتاز للمستخدم
        if (percentage > 25 && percentage < 55) {
          statusEl.textContent = 'Analyzing display grid matrix...';
        } else if (percentage >= 55 && percentage < 85) {
          statusEl.textContent = 'Compiling application environment packages...';
        } else if (percentage >= 85) {
          statusEl.textContent = 'Finalizing operational verification...';
        }

        if (progress < duration) {
          requestAnimationFrame(animateProgress);
        } else {
          completeDetection();
        }
      }
      
      requestAnimationFrame(animateProgress);
    });

    function completeDetection() {
      const deviceData = analyzeDevice();
      
      progressWrapper.style.display = 'none';
      detectBtn.style.display = 'none'; 
      
      statusEl.textContent = 'Device environment identified!';
      statusEl.style.color = 'rgba(255,255,255,0.4)';
      
      // تعيين البيانات الاحترافية والأيقونة المناسبة للجهاز
      downloadText.textContent = deviceData.text;
      downloadIcon.textContent = deviceData.icon;
      deviceDetails.textContent = deviceData.info;
      
      resultContainer.style.display = 'block';

      // تفعيل زر التثبيت والتنزيل الفعلي للموقع بالكامل
      downloadBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`Installation outcome: ${outcome}`);
          deferredPrompt = null;
        } else {
          alert('Application bundle is already active or shortcuts generated. Check your App Drawer / Desktop!');
        }
      });
    }

    window.addEventListener('appinstalled', () => {
      statusEl.textContent = 'Installation Complete!';
    });
  </script>
</body>
</html>
