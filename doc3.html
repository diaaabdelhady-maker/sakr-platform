    .doc-card { background: linear-gradient(145deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)); border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; padding: 18px; box-shadow: 0 18px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10); }
    .doc-card h2 { margin: 0 0 10px; color: #fff; font-size: 20px; }
    .doc-card .btn { min-height: 52px; font-size: 18px; border-radius: 16px; width: 100%; }
    @media (min-width: 850px) { .doc-grid { grid-template-columns: repeat(2, 1fr); } }

    <!-- Settings System Initializer -->
    <script>
      (function() {
        const theme = localStorage.getItem('settings-theme') || 'dark';
        const accent = localStorage.getItem('settings-accent') || 'gold';
        const fontSize = localStorage.getItem('settings-fontSize') || 'normal';
        const sidebarSide = localStorage.getItem('settings-sidebarSide') || 'right';
        const animations = localStorage.getItem('settings-animations') || 'normal';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-accent', accent);
        document.documentElement.setAttribute('data-font-size', fontSize);
        document.documentElement.setAttribute('data-sidebar-side', sidebarSide);
        document.documentElement.setAttribute('data-animations', animations);
      })();
    </script>

<body>
<script>
(function(){

})();
</script>

    <section class="hero-card hero-split">

        <p class="eyebrow">DOCUMENTS</p>
        <img src="logo.png" width="350px" id="mlogo" alt="AMR SAKR logo">

        <p class="hero-text">Open your documents</p>

    <section id="container" class="doc-grid"></section>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyA-P8PUBG9CXAUPdU668hznL-BT2753Sqo",
  authDomain: "course3-8ee4b.firebaseapp.com",
  projectId: "course3-8ee4b",
  storageBucket: "course3-8ee4b.firebasestorage.app",
  messagingSenderId: "230287640540",
  appId: "1:230287640540:web:9e25a10ff59005cd143119"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

async function loadButtons(){
    container.innerHTML = "";
    const docSnap = await getDocs(collection(db,"documents"));
    docSnap.forEach(item => {
        const data = item.data();
        if(!data.name || !data.link) return;
        container.innerHTML += `
        <div class="doc-card">
            <h2>📄 ${data.name}</h2>
            <button class="btn"
onclick="window.location.href='${data.link}'">
    DOWNLOAD DOCUMENT
</button>
        </div>
        `;
    });
}

loadButtons();

const menuBtn = document.getElementById('menuBtn');
const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('menuOverlay');
const closeMenu = document.getElementById('closeMenu');

function openMenu() {
  sideMenu.classList.add('open');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeMenuPanel() {
  sideMenu.classList.remove('open');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

menuBtn.addEventListener('click', openMenu);
closeMenu.addEventListener('click', closeMenuPanel);
overlay.addEventListener('click', closeMenuPanel);
document.addEventListener('keydown', function (event) {
  if (event.key === 'Escape') closeMenuPanel();
});

</script>
</body>
