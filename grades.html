  <style>
    body {
      padding-top: 82px;
    }

    .hero-wrap {
      width: min(100%, 1120px);
    }

    .student-box {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .error-card {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.25);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: #ff8d8d;
    }

    /* كروت الدرجات الجديدة */
    .grade-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
    }

    .grade-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grade-info h4 {
      margin: 0;
      font-size: 20px;
      color: #ffd700;
      letter-spacing: 0.5px;
    }

    .grade-info .subject-text {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.9);
    }

    .grade-info .score-text {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      margin-top: 4px;
    }

    .grade-status-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 90px;
    }

    .appreciation-tag {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* الألوان الخاصة بالتقديرات */
    .tag-perfect { background: rgba(0, 230, 118, 0.2); color: #00e676; border: 1px solid rgba(0, 230, 118, 0.4); }
    .tag-verygood { background: rgba(0, 176, 255, 0.2); color: #00b0ff; border: 1px solid rgba(0, 176, 255, 0.4); }
    .tag-pass { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.4); }
    .tag-studymore { background: rgba(255, 61, 0, 0.2); color: #ff3d00; border: 1px solid rgba(255, 61, 0, 0.4); }

    /* أنيميشن الدائرة وعلامة الصح والخطأ */
    .status-svg {
      width: 50px;
      height: 50px;
      display: block;
    }

    .svg-success initial, .svg-error initial {
      fill: none;
    }

    .circle-anim {
      stroke-dasharray: 150;
      stroke-dashoffset: 150;
      animation: strokeCircle 0.6s ease-in-out forwards;
    }

    .check-anim {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: strokeCheck 0.4s 0.5s ease-in-out forwards;
    }

    .cross-anim-1 {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: strokeCheck 0.3s 0.4s ease-in-out forwards;
    }
    
    .cross-anim-2 {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: strokeCheck 0.3s 0.6s ease-in-out forwards;
    }

    @keyframes strokeCircle {
      to { stroke-dashoffset: 0; }
    }

    @keyframes strokeCheck {
      to { stroke-dashoffset: 0; }
    }

    @media (max-width: 768px) {
      .grade-card {
        flex-direction: column;
        text-align: center;
        align-items: center;
      }
      .grade-status-wrapper {
        margin-top: 10px;
      }
    }
  </style>

        document.documentElement.setAttribute('data-theme', theme);

        document.documentElement.setAttribute('data-animations', animations);
      })();
    </script>

</head>
<body>

  <script>
    /* كود فتح وإغلاق القائمة الجانبية المقتبس من التصميم المفضل لديك */
    const menuBtn = document.getElementById('menuBtn');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    const closeMenu = document.getElementById('closeMenu');

    function openMenu() {
      sideMenu.classList.add('open');
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeMenuPanel() {
      sideMenu.classList.remove('open');
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }

    menuBtn.addEventListener('click', openMenu);
    closeMenu.addEventListener('click', closeMenuPanel);
    overlay.addEventListener('click', closeMenuPanel);

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeMenuPanel();
      }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAC1bNuWAD8noagHV2SD0y4PP0ABhxDdqo",
      authDomain: "students-68430.firebaseapp.com",
      projectId: "students-68430",
      storageBucket: "students-68430.firebasestorage.app",
      messagingSenderId: "202641775624",
      appId: "1:202641775624:web:fe2d70e4ec92d62d5b85bd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const resultBox = document.getElementById("resultBox");

    async function loadGradesByCode(code) {
      const trimmed = (code || "").trim();
      if (!trimmed) {
        resultBox.innerHTML = "<div class='error-card'><strong>No signed-in student found. Please sign in first.</strong></div>";
        return;
      }

      // البحث عن الطالب للتأكد من وجود حسابه (دون إظهار اسمه أو كوده بالصفحة كما طلبت)
      const studentsSnapshot = await getDocs(collection(db, "students"));
      let studentExists = false;
      studentsSnapshot.forEach((docSnap) => {
        if (docSnap.id === trimmed) {
          studentExists = true;
        }
      });

      if (!studentExists) {
        resultBox.innerHTML = "<div class='error-card'><strong>Student account is invalid or not found.</strong></div>";
        return;
      }

      // جلب الدرجات وترتيبها
      const q = query(collection(db, "grades"), where("studentId", "==", trimmed));
      const snapshot = await getDocs(q);
      const grades = snapshot.docs
        .map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }))
        .sort((a, b) => Number(a.examNumber || 0) - Number(b.examNumber || 0));

      resultBox.innerHTML = "";

      if (!grades.length) {
        resultBox.innerHTML = "<div class='error-card' style='background:rgba(255,255,255,0.05); color:#fff; border-color:rgba(255,255,255,0.1)'><strong>No exam grades uploaded yet.</strong></div>";
        return;
      }

      grades.forEach((item) => {
        const studentScore = parseFloat(item.grade || 0);
        const totalScore = parseFloat(item.totalGrade || 100); 
        const percentage = (studentScore / totalScore) * 100;

        // تحديد التقدير ولون التاج
        let appreciation = "Study More";
        let tagClass = "tag-studymore";

        if (percentage >= 95) {
          appreciation = "Perfect";
          tagClass = "tag-perfect";
        } else if (percentage >= 90) {
          appreciation = "Very Good";
          tagClass = "tag-verygood";
        } else if (percentage >= 80) {
          appreciation = "Pass";
          tagClass = "tag-pass";
        }

        // إعداد عنصر الرسم المتحرك الـ SVG (صح خضراء أو خطأ أحمر) بناءً على نسبة النجاح 50%
        let svgGraphic = "";
        if (percentage >= 50) {
          svgGraphic = `
            <svg class="status-svg" viewBox="0 0 52 52">
              <circle class="circle-anim" cx="26" cy="26" r="25" fill="none" stroke="#00e676" stroke-width="3"/>
              <path class="check-anim" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14 27l7 7 16-16"/>
            </svg>
          `;
        } else {
          svgGraphic = `
            <svg class="status-svg" viewBox="0 0 52 52">
              <circle class="circle-anim" cx="26" cy="26" r="25" fill="none" stroke="#ff3d00" stroke-width="3"/>
              <path class="cross-anim-1" fill="none" stroke="#ff3d00" stroke-width="4" stroke-linecap="round" d="M16 16l20 20"/>
              <path class="cross-anim-2" fill="none" stroke="#ff3d00" stroke-width="4" stroke-linecap="round" d="M36 16L16 36"/>
            </svg>
          `;
        }

        const card = document.createElement("div");
        card.className = "grade-card";
        card.innerHTML = `
          <div class="grade-info">
            <h4>Exam ${item.examNumber || "-"}</h4>
            <div class="subject-text">Subject: ${item.subject || "-"}</div>
            <div class="score-text">Score: ${studentScore} / ${totalScore} (${percentage.toFixed(1)}%)</div>
          </div>
          <div class="grade-status-wrapper">
            ${svgGraphic}
            <div class="appreciation-tag ${tagClass}">${appreciation}</div>
          </div>
        `;
        resultBox.appendChild(card);
      });
    }

    const signedInCode = localStorage.getItem("userId") || localStorage.getItem("savedCode") || "";
    document.getElementById("searchBtn").addEventListener("click", () => loadGradesByCode(signedInCode));
    loadGradesByCode(signedInCode);
  </script>
