<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>offline</title>

<link rel="stylesheet" href="style.css?v=2">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="logo.png" type="image/png">

<style>

.offline-card-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    z-index: 999;
    background: rgba(10, 11, 14, 0.6);
}

.offline-banner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;

    background: rgba(18, 20, 26, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    color: white;

    padding: 40px 36px;
    border-radius: 20px;

    border: 1px solid rgba(234, 67, 53, 0.25);

    box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.7),
        0 0 40px rgba(234, 67, 53, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);

    font-family: 'Share Tech', sans-serif;
    text-align: center;

    max-width: 400px;
    width: 100%;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* خط ضوئي أعلى المربع لإعطاء مظهر متقدم */
.offline-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 15%;
    right: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ea4335, transparent);
}

.offline-banner .icon-wrapper {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(234, 67, 53, 0.18) 0%, rgba(234, 67, 53, 0.05) 70%);
    border: 1px solid rgba(234, 67, 53, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-ring 2.5s infinite ease-in-out;
}

.offline-banner .icon {
    width: 42px;
    height: 42px;
    user-select: none;
    filter: brightness(0) saturate(100%) invert(48%) sepia(93%) saturate(2000%) hue-rotate(330deg);
}

.title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
    text-shadow: 0 0 10px rgba(234, 67, 53, 0.3);
}

.subtext {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.65);
    letter-spacing: 0.8px;
    line-height: 1.6;
    margin: 0;
}

/* زر Try Again */
.btn-retry {
    margin-top: 8px;
    padding: 12px 32px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #ffffff;
    background: linear-gradient(135deg, rgba(234, 67, 53, 0.8), rgba(180, 30, 30, 0.9));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    cursor: pointer;
    outline: none;
    box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-retry:hover {
    background: linear-gradient(135deg, rgba(255, 75, 60, 0.9), rgba(210, 40, 40, 1));
    box-shadow: 0 6px 20px rgba(234, 67, 53, 0.5);
    transform: translateY(-2px);
}

.btn-retry:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(234, 67, 53, 0.3);
}

@keyframes pulse-ring {
    0% {
        box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4);
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 0 16px rgba(234, 67, 53, 0);
        transform: scale(1.04);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(234, 67, 53, 0);
        transform: scale(1);
    }
}

</style>

<script>
(function(){
    const theme = localStorage.getItem('settings-theme') || 'dark';
    const accent = localStorage.getItem('settings-accent') || 'gold';

    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('data-accent', accent);
})();
</script>

</head>

<body>

<div class="upbox">
    <div class="hh">
        <img src="logo.png" width="70px" alt="Logo">
    </div>
    &nbsp;&nbsp;&nbsp;&nbsp;<span class="brand-name">AMR SAKR</span>
</div>

<main>
    <section class="hero-actions">
        <div class="offline-card-wrapper">
            <div class="offline-banner">
                <div class="icon-wrapper">
                    <img class="icon" src="wifi_off.svg" alt="No Internet">
                </div>

                <h2 class="title">You Are Offline</h2>

                <p class="subtext">
                    Unable to connect to the network.<br>
                    Please check your connection and try again.
                </p>

                <button class="btn-retry" onclick="window.location.reload();">
                    Try Again
                </button>
            </div>
        </div>
    </section>
</main>

</body>
</html>
