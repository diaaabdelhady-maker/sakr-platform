<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>offline</title>

<link rel="stylesheet" href="style.css?v=2">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="logo.png" type="image/png">

<style>

.offline-card-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    z-index: 999;
}


.offline-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;

    background: rgba(20,21,26,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

    color: white;

    padding: 36px 48px;
    border-radius: 24px;

    border: 1px solid rgba(234,67,53,0.3);

    box-shadow:
    0 20px 50px rgba(0,0,0,.6),
    0 0 30px rgba(234,67,53,.2);

    font-family: 'Share Tech', sans-serif;

    text-align:center;

    max-width:420px;
    width:100%;
}


.offline-banner .icon-wrapper {

    width:80px;
    height:80px;

    border-radius:50%;

    background:rgba(234,67,53,.12);

    border:1px solid rgba(234,67,53,.3);

    display:flex;
    align-items:center;
    justify-content:center;

    animation:pulse-ring 2.5s infinite ease-in-out;
}


/* SVG ICON */

.offline-banner .icon {

    width:48px;
    height:48px;

    user-select:none;

    filter:
    brightness(0)
    saturate(100%)
    invert(48%)
    sepia(93%)
    saturate(2000%)
    hue-rotate(330deg);

}


.title {

    font-size:20px;
    font-weight:700;

    color:white;

    letter-spacing:2px;

    text-transform:uppercase;

    margin:0;

}



.subtext {

    font-size:14px;

    color:rgba(255,255,255,.7);

    letter-spacing:1px;

    line-height:1.5;

    margin:0;

}



@keyframes pulse-ring {

0% {

box-shadow:0 0 0 0 rgba(234,67,53,.4);

transform:scale(1);

}


50% {

box-shadow:0 0 0 15px rgba(234,67,53,0);

transform:scale(1.03);

}


100% {

box-shadow:0 0 0 0 rgba(234,67,53,0);

transform:scale(1);

}

}

</style>


<script>

(function(){

const theme = localStorage.getItem('settings-theme') || 'dark';
const accent = localStorage.getItem('settings-accent') || 'gold';

document.documentElement.setAttribute('data-theme',theme);
document.documentElement.setAttribute('data-accent',accent);

})();

</script>

</head>


<body>


<div class="upbox">

<div class="hh">
<img src="logo.png" width="70px" alt="Logo">
</div>

<span class="brand-name">
AMR SAKR
</span>

</div>



<main>

<section class="hero-actions">


<div class="offline-card-wrapper">


<div class="offline-banner">


<div class="icon-wrapper">

<img class="icon" src="wifi_off.svg" alt="No Internet">

</div>


<h2 class="title">
You Are Offline
</h2>


<p class="subtext">

Unable to connect to the network.
Please check your internet connection and try again.

</p>


</div>


</div>


</section>

</main>


</body>

</html>
