<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Internet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.offline-box{
    width:100%;
    max-width:380px;
    background:#1e293b;
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    animation:fade .5s ease;
}

.offline-box img{
    width:100px;
    margin-bottom:20px;
}

.offline-box h1{
    color:#fff;
    font-size:28px;
    margin-bottom:12px;
}

.offline-box p{
    color:#94a3b8;
    line-height:1.6;
    font-size:15px;
    margin-bottom:28px;
}

.retry-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

.retry-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.retry-btn:active{
    transform:scale(.98);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="offline-box">
    <img src="wifi_off.svg" alt="Offline">

    <h1>No Internet</h1>

    <p>
        It looks like you're offline.<br>
        Please check your connection and try again.
    </p>

    <button class="retry-btn" onclick="retryConnection()">
        Try Again
    </button>
</div>

<script>
function retryConnection() {
    if (navigator.onLine) {
        location.href = "/";
    } else {
        location.reload();
    }
}

window.addEventListener("online", () => {
    location.href = "/";
});
</script>

</body>
</html>
