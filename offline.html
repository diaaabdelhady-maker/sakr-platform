<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>THE DESIGNER</title>
        <link rel="stylesheet" href="style.css?v=2">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Orbitron:wght@500;800&display=swap" rel="stylesheet"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- Google Material Symbols Icons -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

        <link rel="icon" href="logo.png" type="image/png">

        <style>
          /* ========================================================
             OFFLINE BANNER & GOOGLE ICONS STYLES
             ======================================================== */
          .offline-card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            width: 100%;
          }

          .offline-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(32, 33, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 16px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            font-family: 'Share Tech', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
          }

          .offline-banner:hover {
            border-color: rgba(234, 67, 53, 0.4);
            box-shadow: 0 12px 35px rgba(234, 67, 53, 0.15);
            transform: translateY(-2px);
          }

          /* Google Material Icon */
          .offline-banner .icon {
            color: #ea4335; /* Google Alert Red */
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-icon 2s infinite;
          }

          /* Message Text */
          .offline-banner .message {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
          }

          @keyframes pulse-icon {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
          }
        </style>

        <!-- Settings System Initializer -->
        <script>
          (function() {
            const theme = localStorage.getItem('settings-theme') || 'dark';
            const accent = localStorage.getItem('settings-accent') || 'gold';
            const fontSize = localStorage.getItem('settings-fontSize') || 'normal';
            const sidebarSide = localStorage.getItem('settings-sidebarSide') || 'right';
            const animations = localStorage.getItem('settings-animations') || 'normal';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-accent', accent);
            document.documentElement.setAttribute('data-font-size', fontSize);
            document.documentElement.setAttribute('data-sidebar-side', sidebarSide);
            document.documentElement.setAttribute('data-animations', animations);
          })();
        </script>
        <script src="settings.js" defer></script>
    </head>
    <body>
    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="upbox">
       &nbsp;&nbsp;&nbsp;&nbsp;<div class="hh"> <img src="logo.png" width="70px" alt="Logo"></div>
       
      <span class="brand-name">AMR SAKR</span>
      <div class="upboxs">
        
      </div>
    </div>



        <!-- Offline Status Banner -->
        <aside class="hero-actions">
          <div class="offline-card-wrapper">
            <div class="offline-banner">
              <span class="material-symbols-outlined icon">wifi_off</span>
              <span class="message">You are offline. Check connection.</span>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const menuBtn = document.getElementById('menuBtn');
      const sideMenu = document.getElementById('sideMenu');
      const overlay = document.getElementById('menuOverlay');
      const closeMenu = document.getElementById('closeMenu');

      function openMenu() {
        sideMenu.classList.add('open');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }

      function closeMenuPanel() {
        sideMenu.classList.remove('open');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }

      menuBtn.addEventListener('click', openMenu);
      closeMenu.addEventListener('click', closeMenuPanel);
      overlay.addEventListener('click', closeMenuPanel);

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closeMenuPanel();
        }
      });
    </script>
    </body>
</html>
