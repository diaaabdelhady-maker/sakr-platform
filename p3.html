<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC1bNuWAD8noagHV2SD0y4PP0ABhxDdqo",
  authDomain: "students-68430.firebaseapp.com",
  projectId: "students-68430",
  storageBucket: "students-68430.firebasestorage.app",
  messagingSenderId: "202641775624",
  appId: "1:202641775624:web:fe2d70e4ec92d62d5b85bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.goLogin = function(message){
    if (message) {
        alert(message);
    }
    localStorage.removeItem("savedCode");
    localStorage.removeItem("userId");
    localStorage.removeItem("userName");
    localStorage.removeItem("userRole");
    localStorage.removeItem("completedLessons");
    window.location.href = "code.html";
}

async function checkUser(){
    let code = new URLSearchParams(window.location.search).get("code");

    if(!code){
        code = localStorage.getItem("userId");
    }

    if(!code){
        window.goLogin("Please enter your code first.");
        return;
    }

    try {
        const ref = doc(db, "students", code);
        const snap = await getDoc(ref);

        if(!snap.exists()){
            window.goLogin("This code is wrong. Please try again.");
            return;
        }

        const data = snap.data();

        if(!data.active){
            window.goLogin("Your code is not active.");
            return;
        }

        // الفحص الذكي لإعادة توجيه ولي الأمر أو الزائر للصفحة الصحيحة بناءً على مستند الفايربيز بالكامل
        const dataString = JSON.stringify(data).toLowerCase();
        const codeLower = code.toLowerCase();

        if (dataString.includes('middle 1') || codeLower.includes('middle 1')) {
            window.location.href = "p1.html?code=" + encodeURIComponent(code);
            return;
        } else if (dataString.includes('middle 2') || codeLower.includes('middle 2')) {
            window.location.href = "p2.html?code=" + encodeURIComponent(code);
            return;
        }

        const currentRole = localStorage.getItem("userRole") || "students";
        let displayName = data.name;

        if (currentRole === "parents") {
            displayName = "PR. " + displayName;
        }

        document.getElementById("nameDisplay").textContent = displayName;

        localStorage.setItem("userName", displayName);
        localStorage.setItem("userId", code);

        if (data.completedLessons && Array.isArray(data.completedLessons)) {
            localStorage.setItem("completedLessons", JSON.stringify(data.completedLessons));
        } else {
            localStorage.setItem("completedLessons", JSON.stringify([]));
        }

        if (window.location.search.includes("code=")) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    } catch (e) {
        console.error("Firebase Error: ", e);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    checkUser();
});
</script>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');

  function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeMenuPanel() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenu) closeMenu.addEventListener('click', closeMenuPanel);
  if (overlay) overlay.addEventListener('click', closeMenuPanel);

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeMenuPanel();
  });
</script>
