<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REGISTER</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        .signup-form {
            width: 100%;
            max-width: 380px;
            margin: 20px auto;
            padding: 25px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ccc;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Share Tech', sans-serif;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #fff; outline: none; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            font-family: 'Share Tech', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
        }
        .status-box {
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 380px;
        }
        .status-pending { background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; color: #ffc107; }
        .status-approved { background: rgba(37, 211, 102, 0.1); border: 1px solid #25D366; color: #25D366; }
        .status-rejected { background: rgba(220, 53, 69, 0.1); border: 1px solid #dc3545; color: #dc3545; }
        .whatsapp-btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 24px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
    <!-- Settings System Initializer -->
    <script>
      (function() {
        const theme = localStorage.getItem('settings-theme') || 'dark';
        const accent = localStorage.getItem('settings-accent') || 'gold';
        const fontSize = localStorage.getItem('settings-fontSize') || 'normal';
        const sidebarSide = localStorage.getItem('settings-sidebarSide') || 'right';
        const animations = localStorage.getItem('settings-animations') || 'normal';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-accent', accent);
        document.documentElement.setAttribute('data-font-size', fontSize);
        document.documentElement.setAttribute('data-sidebar-side', sidebarSide);
        document.documentElement.setAttribute('data-animations', animations);
      })();
    </script>
    <script src="settings.js" defer></script>
</head>
<body>
<script>
(function(){
  const hasAccess = !!(localStorage.getItem('savedCode') || localStorage.getItem('userId'));
  if (!hasAccess) {
    localStorage.removeItem('savedCode');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    localStorage.removeItem('completedLessons');
    localStorage.removeItem('userRole');
    window.location.replace('code.html');
  }
})();
</script>
    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="upbox">
       &nbsp;&nbsp;&nbsp;&nbsp;<div class="hh"> <img src="logo.png" width="70px" alt="Logo"></div>
      <span class="brand-name">AMR SAKR</span>
      <div class="upboxs">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
          <img src="menu.png" width="60px" alt="Menu">
        </button>
      </div>
    </div>

    <aside id="sideMenu" class="side-menu" aria-label="Main menu">
      <button id="closeMenu" class="close-menu" type="button" aria-label="Close menu"><span class="material-symbols-rounded">close</span></button>
      <h2>AMR SAKR</h2>
      <a href="device-detect.html"><span class="material-symbols-rounded menu-icon">download</span>DOWNLOAD AS AN APP</a>
<a href="#" onclick="localStorage.clear(); location.reload();"><span class="material-symbols-rounded menu-icon">logout</span>SIGN OUT / RESET</a>
    </aside>

    <main class="hero-wrap">
      <section class="hero-card hero-split">
        <article class="hero-visual">
          <p class="eyebrow">unlock the wonders of science</p>
          <img src="logo.png" width="350px" id="mlogo" alt="AMR SAKR logo">
          <h1 class="hero-title">AMR SAKR</h1>
          <p class="hero-text">best science platform <br> ( dive into the world of science )</p>
        </article>

        <article class="hero-visual">
            <div id="formContainer">
                <form class="signup-form" id="regForm">
                    <h2 style="margin-bottom: 20px; font-size: 24px;">SIGN UP</h2>
                    <div class="form-group">
                        <label>Your Full Name</label>
                        <input type="text" id="studentName" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Your Phone Number</label>
                        <input type="tel" id="studentPhone" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Parent Phone Number</label>
                        <input type="tel" id="parentPhone" required autocomplete="off">
                    </div>
                    <button type="submit" class="submit-btn">Submit Request</button>
                </form>
            </div>
            <div id="statusContainer" style="display: none; width: 100%;"></div>
        </article>
      </section>
    </main>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCEFLxdWt8h1_JWjzyJ2n2dP-HXxmD3jvU",
        authDomain: "signup-27311.firebaseapp.com",
        projectId: "signup-27311",
        storageBucket: "signup-27311.firebasestorage.app",
        messagingSenderId: "486600508939",
        appId: "1:486600508939:web:6802cff99cb9244218a90e"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore(); // تحويل لـ Firestore

      const formContainer = document.getElementById('formContainer');
      const statusContainer = document.getElementById('statusContainer');
      const regForm = document.getElementById('regForm');

      const localPhone = localStorage.getItem('user_phone');
      if (localPhone) {
          listenToStatus(localPhone);
      }

      regForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const name = document.getElementById('studentName').value.trim();
          const phone = document.getElementById('studentPhone').value.trim();
          const parent = document.getElementById('parentPhone').value.trim();

          if(name && phone && parent) {
              db.collection('students').doc(phone).set({
                  name: name,
                  phone: phone,
                  parentPhone: parent,
                  status: 'pending'
              }).then(() => {
                  localStorage.setItem('user_phone', phone);
                  listenToStatus(phone);
              }).catch(err => {
                  alert("Firestore Error: " + err.message);
              });
          }
      });

      function listenToStatus(phone) {
          formContainer.style.display = 'none';
          statusContainer.style.display = 'block';

          db.collection('students').doc(phone).onSnapshot((doc) => {
              if (doc.exists) {
                  const data = doc.data();
                  if(data.status === 'pending') {
                      statusContainer.innerHTML = `
                          <div class="status-box status-pending">
                              <h2>YOUR REQUEST IS UNDER REVIEW</h2>
                              <p style="margin-top:10px;">Please wait until the administration team accepts your request.</p>
                          </div>
                      `;
                  } else if(data.status === 'approved') {
                      const msg = encodeURIComponent(
                          `بيانات الطالب للتسجيل:\n` +
                          `- الاسم: ${data.name}\n` +
                          `- رقم الموبايل: ${data.phone}\n` +
                          `- رقم ولي الأمر: ${data.parentPhone}\n\n` +
                          `كيف يمكن الدفع؟`
                      );
                      statusContainer.innerHTML = `
                          <div class="status-box status-approved">
                              <h2>CONGRATULATIONS! YOU ARE ACCEPTED</h2>
                              <p style="margin-top:10px;">Your request has been approved successfully.</p>
                              <a href="https://wa.me/201274191434?text=${msg}" target="_blank" class="whatsapp-btn">Contact via WhatsApp</a>
                          </div>
                      `;
                  } else if(data.status === 'rejected') {
                      statusContainer.innerHTML = `
                          <div class="status-box status-rejected">
                              <h2>SORRY! YOU ARE NOT ACCEPTED</h2>
                              <p style="margin-top:10px;">Your registration request was declined by the administrator.</p>
                          </div>
                      `;
                  }
              }
          });
      }

      const menuBtn = document.getElementById('menuBtn');
      const sideMenu = document.getElementById('sideMenu');
      const overlay = document.getElementById('menuOverlay');
      const closeMenu = document.getElementById('closeMenu');
      menuBtn.addEventListener('click', () => { sideMenu.classList.add('open'); overlay.classList.add('show'); });
      closeMenu.addEventListener('click', () => { sideMenu.classList.remove('open'); overlay.classList.remove('show'); });
    </script>
</body>
</html>
