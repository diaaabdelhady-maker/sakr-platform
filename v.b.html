<body>
<script>
(function(){
  const hasAccess = !!(localStorage.getItem('savedCode') || localStorage.getItem('userId'));
  if (!hasAccess) {
    localStorage.removeItem('savedCode');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    localStorage.removeItem('completedLessons');
    localStorage.removeItem('userRole');
    window.location.replace('code.html');
  }
})();
</script>

  </aside>

  <main class="hero-wrap">
    <section class="hero-card hero-split code-card">
      <article class="hero-visual">
        <p class="eyebrow">ENTER YOUR VAPID CODE</p>
        <img src="logo.png" width="350px" id="mlogo" alt="AMR SAKR logo">
        <h1 class="hero-title">AMR SAKR</h1>
        <p class="hero-text">Enter your 10-digit Vapid Code (XXXXX-XXXXX)</p>
      </article>

      <aside class="hero-actions code-actions">
        <div class="btn-group">
          <label class="code-label" for="text">Vapid Code</label>
          <input class="code-input" type="text" id="text" placeholder="Enter V.C">
          <button class="btn" type="button" id="confirmBtn">VIEW PROFILE INFO</button>
          <p class="code-note" style="margin-top: 12px;">Your Profile Info</p>
          <div id="studentResultDisplay" style="display: none; width: 100%;"></div>

          
        </div>
      </aside>
    </section>
  </main>

<script type="module">
  // استيراد وتجهيز Firebase بقاعدة البيانات الخاصة بك
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAC1bNuWAD8noagHV2SD0y4PP0ABhxDdqo",
    authDomain: "students-68430.firebaseapp.com",
    projectId: "students-68430",
    storageBucket: "students-68430.firebasestorage.app",
    messagingSenderId: "202641775624",
    appId: "1:202641775624:web:fe2d70e4ec92d62d5b85bd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // التحكم في القائمة الجانبية (Side Menu)
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');

  function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeMenuPanel() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenu) closeMenu.addEventListener('click', closeMenuPanel);
  if (overlay) overlay.addEventListener('click', closeMenuPanel);
  
  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closeMenuPanel();
  });

  // التحقق الفوري إذا كان الـ Vapid Code محفوظاً مسبقاً
  const savedVC = localStorage.getItem('savedVapidCode');
  if (savedVC) {
    document.getElementById('text').value = savedVC;
    // يمكنك تفعيل التحويل التلقائي إذا رغبت بفك التعليق عن السطر التالي:
    // window.location.href = 'loading2.html?vc=' + encodeURIComponent(savedVC);
  }

  // دالة البحث والتحقق من الـ Vapid Code
  async function checkVapidCode() {
    const vcInput = document.getElementById('text').value.trim();
    const displayContainer = document.getElementById('studentResultDisplay');

    if (!vcInput) {
      alert('Please enter your Vapid Code');
      return;
    }

    displayContainer.style.display = "none";
    displayContainer.innerHTML = "";

    try {
      // البحث في Firestore عن الطالب الذي يملك هذا الـ vapidCode
      const q = query(collection(db, "students"), where("vapidCode", "==", vcInput));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        alert("Invalid Vapid Code! Please check your contact support.");
        return;
      }

      // الحصول على بيانات الطالب المكتشف
      let studentData = null;
      querySnapshot.forEach((doc) => {
        studentData = doc.data();
      });

      // حفظ الكود للزيارات القادمة
      localStorage.setItem('savedVapidCode', vcInput);

      // صياغة النص الكامل الذي سيتم نسخه عند ضغط زر الكوبي
      const textToCopy = `Student Profile:\nName: ${studentData.name}\nID: ${studentData.id}\nPhone: ${studentData.phone}\nStage: Middle ${studentData.middle || 1}\nStatus: ${studentData.active ? 'Active' : 'Inactive'}`;

      // بناء وتحديث كارت معلومات الطالب واجهياً
      displayContainer.innerHTML = `
        <div class="student-info-box">
          <h3>Welcome, ${studentData.name}</h3>
          <p>ID: <span class="highlight-yellow">${studentData.id}</span></p>
          <p>Phone: <span>${studentData.phone}</span></p>
          <p>Grade: <span>Middle ${studentData.middle || 1}</span></p>
          <p>Account Status: 
            <span class="status-dot ${studentData.active ? 'active' : 'inactive'}"></span>
            <span style="color: ${studentData.active ? '#4edf7a' : '#ff4d4d'}">${studentData.active ? 'Active' : 'Inactive'}</span>
          </p>
          
          <button type="button" class="btn-copy-all" id="copyAllDetailsBtn">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span id="copyBtnText">Copy Profile Info</span>
          </button>
          <button type="button" class="btn-use-id" id="useIdBtn">Use this ID to sign in</button>
        </div>
      `;
      displayContainer.style.display = "block";

      // ربط حدث النسخ بالزر الجديد ديناميكياً
      document.getElementById('copyAllDetailsBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(textToCopy).then(() => {
          const btnText = document.getElementById('copyBtnText');
          btnText.innerText = "Copied Success!";
          this.style.background = "#4edf7a";
          
          setTimeout(() => {
            btnText.innerText = "Copy Profile Info";
            this.style.background = "#ffe675";
          }, 4000);
        }).catch(err => console.error('Error copying text: ', err));
      });

      document.getElementById('useIdBtn').addEventListener('click', function() {
        localStorage.setItem('savedCode', studentData.id);
        localStorage.setItem('userRole', 'students');
        window.location.href = 'loading2.html?code=' + encodeURIComponent(studentData.id);
      });

      // توجيه اختياري بعد العرض إلى صفحة التحميل بعد فترة قصيرة إذا أحببت، أو ترك الخيار له.
      // window.location.href = 'loading2.html?vc=' + encodeURIComponent(vcInput);

    } catch (error) {
      console.error("Error accessing database: ", error);
      alert("Connection error! Please try again.");
    }
  }

  // ربط أحداث النقر والتسجيل
  document.getElementById('confirmBtn').addEventListener('click', checkVapidCode);
  
  document.getElementById('signOutBtn').addEventListener('click', () => {
    localStorage.removeItem('savedVapidCode');
    document.getElementById('text').value = "";
    document.getElementById('studentResultDisplay').style.display = "none";
    closeMenuPanel();
    alert('Signed out successfully.');
  });
</script>
</body>
